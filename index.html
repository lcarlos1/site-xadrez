<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xadrez Pro — IA de Alta Performance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#30363d;
  --accent:#58a6ff;--accent2:#1f6feb;--accent3:#388bfd;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;--orange:#db6d28;
  --light-sq:#ebecd0;--dark-sq:#779556;
  --sel-from:rgba(20,85,30,.5);--sel-to:rgba(20,85,30,.5);
  --last-move:rgba(255,255,0,.4);--check-color:rgba(255,0,0,.55);
  --dot:rgba(0,0,0,.25);--ring:rgba(0,0,0,.25);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:8px;--radius-sm:4px;
  --shadow:0 3px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.5);
}
html,body{height:100%;font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;justify-content:center;align-items:center}

.app{display:grid;grid-template-columns:240px auto 240px;grid-template-rows:auto 1fr;gap:0;height:100vh;max-width:1280px;width:100%}

/* Header */
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--surface3)}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-controls{display:flex;align-items:center;gap:8px}

/* Sidebars */
.sidebar{background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.sidebar-left{border-right:1px solid var(--surface3)}
.sidebar-right{border-left:1px solid var(--surface3)}

/* Player panels */
.player-panel{border-radius:var(--radius);padding:14px;background:var(--surface2);border:2px solid transparent;transition:border-color .2s}
.player-panel.active{border-color:var(--accent)}
.player-panel.active .player-indicator{background:var(--green)}
.player-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.player-indicator{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .2s}
.player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.player-name{font-size:13px;font-weight:600;flex:1}
.player-timer{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:22px;font-weight:700;letter-spacing:1px}
.player-timer.low-time{color:var(--red);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.player-captures{display:flex;flex-wrap:wrap;gap:1px;font-size:16px;min-height:22px;align-items:center}
.player-captures span{opacity:.8}
.player-captures .extra{font-size:11px;color:var(--text2);margin-left:2px}

/* Engine info */
.engine-info{margin-top:6px;padding-top:8px;border-top:1px solid var(--surface3)}
.engine-line{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);line-height:1.6}
.engine-line .val{color:var(--text);font-weight:500}

/* Center column */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:12px;background:var(--bg)}

/* Board */
.board-area{position:relative}
.file-labels{display:flex;padding:0 0 2px}
.file-labels span{width:calc(min(520px, calc(100vh - 220px)) / 8);text-align:center;font-size:11px;font-weight:600;color:var(--text2)}
.rank-labels{position:absolute;left:-18px;top:0;bottom:0;display:flex;flex-direction:column}
.rank-labels span{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);width:16px}
.board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(520px,calc(100vh - 220px));aspect-ratio:1;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);user-select:none;position:relative}
.square{position:relative;display:flex;align-items:center;justify-content:center;font-size:clamp(30px,5.5vw,52px);cursor:pointer;transition:background .12s}
.square.light{background:var(--light-sq)}
.square.dark{background:var(--dark-sq)}
.square.selected{background:var(--sel-from) !important}
.square.legal-target .move-dot{position:absolute;width:28%;height:28%;border-radius:50%;background:var(--dot);pointer-events:none;z-index:1}
.square.legal-target.has-piece::after{content:'';position:absolute;width:85%;height:85%;border-radius:50%;border:5px solid var(--ring);pointer-events:none;z-index:1}
.square.last-from,.square.last-to{background:var(--last-move) !important}
.square.in-check{background:var(--check-color) !important;animation:check-pulse 1s ease infinite}
@keyframes check-pulse{0%,100%{background:rgba(255,0,0,.4)}50%{background:rgba(255,0,0,.6)}}
.square .piece{position:relative;z-index:2;pointer-events:none;line-height:1}
.piece-white{color:#fff;text-shadow:0 0 3px rgba(0,0,0,.9),0 0 1px #000,1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000}
.piece-black{color:#1a1a1a;text-shadow:0 0 2px rgba(255,255,255,.3)}
.square .promo-piece{position:absolute;z-index:10}
.coord{position:absolute;font-size:9px;font-weight:700;pointer-events:none;z-index:3}
.coord-file{bottom:2px;right:3px}
.coord-rank{top:2px;left:3px}
.square.light .coord{color:var(--dark-sq)}
.square.dark .coord{color:var(--light-sq)}

/* Thinking overlay */
.thinking-overlay{position:absolute;inset:0;background:rgba(0,0,0,.15);display:none;align-items:center;justify-content:center;border-radius:var(--radius);z-index:20;backdrop-filter:blur(2px)}
.thinking-overlay.visible{display:flex}
.thinking-text{background:var(--surface);padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce .6s ease infinite}
.thinking-dots span:nth-child(2){animation-delay:.15s}
.thinking-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Status bar */
.status-bar{margin-top:8px;display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--surface);border-radius:var(--radius);font-size:13px;min-height:36px}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.green{background:var(--green)}
.status-dot.red{background:var(--red)}
.status-dot.yellow{background:var(--yellow)}
.status-text{flex:1;font-weight:500}

/* Buttons */
.btn{padding:7px 14px;border:1px solid var(--surface3);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface3);border-color:var(--text3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.primary:hover{background:var(--accent3)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(248,81,73,.1)}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* Settings panel */
.settings-panel{padding:12px;background:var(--surface2);border-radius:var(--radius);display:none}
.settings-panel.open{display:block}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px}
.setting-row label{color:var(--text2);font-weight:500}
.setting-row select,.setting-row input[type=range]{background:var(--surface3);border:1px solid var(--text3);color:var(--text);border-radius:var(--radius-sm);padding:4px 8px;font-size:12px}
.setting-row select{min-width:100px}
.setting-row input[type=range]{width:100px}

/* Move history */
.history-panel{flex:1;overflow:hidden;display:flex;flex-direction:column}
.history-panel h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:8px}
.move-history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.move-history::-webkit-scrollbar{width:5px}
.move-history::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
.move-row{display:grid;grid-template-columns:28px 1fr 1fr;gap:2px;font-size:12px;font-family:'JetBrains Mono','Fira Code',monospace}
.move-num{color:var(--text3);text-align:right;padding-right:6px;line-height:24px}
.move-cell{padding:3px 6px;border-radius:var(--radius-sm);line-height:24px;cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-cell:hover{background:var(--surface3)}

/* Game over modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(4px)}
.modal-overlay.visible{display:flex}
.modal{background:var(--surface);border:1px solid var(--surface3);border-radius:12px;padding:32px;text-align:center;box-shadow:var(--shadow-lg);min-width:320px}
.modal h2{font-size:24px;margin-bottom:8px}
.modal p{color:var(--text2);margin-bottom:20px;font-size:14px}
.modal .result-icon{font-size:48px;margin-bottom:12px}

/* Promotion modal */
.promo-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(4px)}
.promo-modal.visible{display:flex}
.promo-box{background:var(--surface);border:1px solid var(--surface3);border-radius:12px;padding:24px;text-align:center;box-shadow:var(--shadow-lg)}
.promo-box h3{margin-bottom:16px;font-size:16px}
.promo-options{display:flex;gap:12px;justify-content:center}
.promo-btn{width:64px;height:64px;font-size:40px;border:2px solid var(--surface3);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.promo-btn:hover{transform:scale(1.1);border-color:var(--accent);background:var(--surface3)}

/* Difficulty badges */
.diff-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.diff-badge.easy{background:rgba(63,185,80,.15);color:var(--green)}
.diff-badge.medium{background:rgba(210,153,34,.15);color:var(--yellow)}
.diff-badge.hard{background:rgba(219,109,40,.15);color:var(--orange)}
.diff-badge.expert{background:rgba(248,81,73,.15);color:var(--red)}

/* Responsive */
@media(max-width:1000px){
  .app{grid-template-columns:1fr;grid-template-rows:auto auto auto auto}
  .sidebar{flex-direction:row;flex-wrap:wrap;padding:10px}
  .sidebar-left,.sidebar-right{border:none;border-bottom:1px solid var(--surface3)}
  .center{padding:8px}
  .board{width:min(95vw,480px)}
  .file-labels span{width:calc(min(95vw, 480px) / 8)}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">♚</div>
      Xadrez Pro
    </div>
    <div class="header-controls">
      <span class="diff-badge" id="diff-badge">MÉDIO</span>
      <div class="btn-group">
        <button class="btn" onclick="toggleSettings()">⚙ Config</button>
        <button class="btn primary" onclick="newGame()">Novo Jogo</button>
      </div>
    </div>
  </div>

  <!-- Left: Black (AI) -->
  <div class="sidebar sidebar-left">
    <div class="player-panel" id="panel-black">
      <div class="player-header">
        <div class="player-indicator"></div>
        <div class="player-avatar" style="background:#1f6feb">🤖</div>
        <span class="player-name">Máquina (Pretas)</span>
      </div>
      <div class="player-timer" id="timer-black">10:00</div>
      <div class="player-captures" id="captures-black"></div>
      <div class="engine-info" id="engine-info" style="display:none">
        <div class="engine-line"><span>Avaliação</span><span class="val" id="eval-score">0.00</span></div>
        <div class="engine-line"><span>Profundidade</span><span class="val" id="eval-depth">0</span></div>
        <div class="engine-line"><span>Nós/s</span><span class="val" id="eval-nps">0</span></div>
        <div class="engine-line"><span>Tempo</span><span class="val" id="eval-time">0ms</span></div>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-panel" id="settings-panel">
      <div class="setting-row">
        <label>Dificuldade</label>
        <select id="difficulty" onchange="onDifficultyChange()">
          <option value="1">Fácil (Prof. 3)</option>
          <option value="2" selected>Médio (Prof. 4)</option>
          <option value="3">Difícil (Prof. 5)</option>
          <option value="4">Expert (Prof. 6)</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Tempo (min)</label>
        <select id="timer-setting" onchange="onTimerChange()">
          <option value="0">Sem limite</option>
          <option value="3">3 min</option>
          <option value="5">5 min</option>
          <option value="10" selected>10 min</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Você joga com</label>
        <select id="player-color" onchange="onColorChange()">
          <option value="w" selected>Brancas</option>
          <option value="b">Pretas</option>
        </select>
      </div>
    </div>

    <!-- History -->
    <div class="history-panel">
      <h4>Histórico de Jogadas</h4>
      <div class="move-history" id="move-history"></div>
    </div>
  </div>

  <!-- Center: Board -->
  <div class="center">
    <div class="board-area">
      <div class="rank-labels" id="rank-labels"></div>
      <div class="file-labels" id="file-labels"></div>
      <div class="board" id="board">
        <div class="thinking-overlay" id="thinking-overlay">
          <div class="thinking-text">
            <div class="thinking-dots"><span></span><span></span><span></span></div>
            IA calculando...
          </div>
        </div>
      </div>
    </div>
    <div class="status-bar" id="status-bar">
      <div class="status-dot green" id="status-dot"></div>
      <span class="status-text" id="status-text">Sua vez — Brancas</span>
    </div>
  </div>

  <!-- Right: White (Player) -->
  <div class="sidebar sidebar-right">
    <div class="player-panel" id="panel-white">
      <div class="player-header">
        <div class="player-indicator"></div>
        <div class="player-avatar" style="background:var(--green)">👤</div>
        <span class="player-name">Você (Brancas)</span>
      </div>
      <div class="player-timer" id="timer-white">10:00</div>
      <div class="player-captures" id="captures-white"></div>
    </div>

    <div class="btn-group" style="flex-direction:column">
      <button class="btn" onclick="undoMove()" id="btn-undo">↩ Desfazer</button>
      <button class="btn" onclick="flipBoard()">⇅ Inverter Tab.</button>
      <button class="btn danger" onclick="resignGame()">🏳 Render</button>
    </div>
  </div>
</div>

<!-- Promotion Modal -->
<div class="promo-modal" id="promo-modal">
  <div class="promo-box">
    <h3>Promover Peão</h3>
    <div class="promo-options" id="promo-options"></div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal-overlay" id="gameover-modal">
  <div class="modal">
    <div class="result-icon" id="result-icon">🏆</div>
    <h2 id="result-title">Fim de Jogo</h2>
    <p id="result-desc"></p>
    <div class="btn-group" style="justify-content:center">
      <button class="btn primary" onclick="newGame();closeModal('gameover-modal')">Novo Jogo</button>
    </div>
  </div>
</div>

    -5,  0,  0,  0,  0,  0,  0, -5,
    -5,  0,  0,  0,  0,  0,  0, -5,
    -5,  0,  0,  0,  0,  0,  0, -5,
     0,  0,  0,  5,  5,  0,  0,  0
  ],
  Q:[
    -20,-10,-10, -5, -5,-10,-10,-20,
    -10,  0,  0,  0,  0,  0,  0,-10,
    -10,  0,  5,  5,  5,  5,  0,-10,
     -5,  0,  5,  5,  5,  5,  0, -5,

    -10,  5,  5,  5,  5,  5,  0,-10,
    -10,  0,  5,  0,  0,  0,  0,-10,

  ],
  K:[
    -50,-40,-30,-20,-20,-30,-40,-50,

    -30,-10, 30, 40, 40, 30,-10,-30,

// ─── Game State ──────────────────────────────────────────
let board, turn, castling, epSquare, halfmove, fullmove;
let selectedSq, legalMovesForSelected, lastMove;
let historyStack=[], whiteCaptures=[], blackCaptures=[];
let whiteTime=600, blackTime=600, timerInterval=null;
let boardFlipped=false, gameOver=false;
let playerColor='w';
let aiThinking=false, abortEngine=false;
let difficulty=2; // depth
let timerMinutes=10;
let engineNodes=0, engineStart=0;

// ─── FEN ─────────────────────────────────────────────────
function parseFEN(fen){
  const p=fen.split(' ');
  const rows=p[0].split('/');
  const b=[];
  for(const row of rows){
    const r=[];
    for(const ch of row){
      if(ch>='1'&&ch<='8') for(let i=0;i<+ch;i++) r.push(null);
      else r.push(ch);
    }
    b.push(r);
  }
  return{board:b,turn:p[1]||'w',castling:p[2]||'-',ep:p[3]==='-'?null:p[3],halfmove:+(p[4]||0),fullmove:+(p[5]||1)};
}

function toFEN(){
  let fen='';
  for(let r=0;r<8;r++){
    let e=0;
    for(let c=0;c<8;c++){
      const pc=board[r][c];
      if(!pc) e++;
      else{ if(e){fen+=e;e=0} fen+=pc }
    }
    if(e) fen+=e;
    if(r<7) fen+='/';
  }
  return `${fen} ${turn} ${castling||'-'} ${epSquare||'-'} ${halfmove} ${fullmove}`;
}

function isWhite(p){return p&&p===p.toUpperCase()}
function isBlack(p){return p&&p===p.toLowerCase()}
function colorOf(p){return p?(isWhite(p)?'w':'b'):null}
function inBounds(r,c){return r>=0&&r<8&&c>=0&&c<8}

// ─── Move Generation ─────────────────────────────────────
function pseudoMoves(bd,clr,ep){
  const moves=[];
  const dir=clr==='w'?-1:1;
  const startRow=clr==='w'?6:1;
  const promoRow=clr==='w'?0:7;

  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=bd[r][c];
    if(!p||colorOf(p)!==clr) continue;
    const type=p.toUpperCase();

    if(type==='P'){
      if(inBounds(r+dir,c)&&!bd[r+dir][c]){
        if(r+dir===promoRow) ['Q','R','B','N'].forEach(q=>{moves.push({fr:r,fc:c,tr:r+dir,tc:c,promo:clr==='w'?q:q.toLowerCase()})});
        else{
          moves.push({fr:r,fc:c,tr:r+dir,tc:c});
          if(r===startRow&&!bd[r+2*dir][c]) moves.push({fr:r,fc:c,tr:r+2*dir,tc:c});
        }
      }
      for(const dc of[-1,1]){
        const nc=c+dc,nr=r+dir;
        if(!inBounds(nr,nc)) continue;
        const tgt=bd[nr][nc];
        if(tgt&&colorOf(tgt)!==clr){
          if(nr===promoRow) ['Q','R','B','N'].forEach(q=>{moves.push({fr:r,fc:c,tr:nr,tc:nc,promo:clr==='w'?q:q.toLowerCase()})});
          else moves.push({fr:r,fc:c,tr:nr,tc:nc});
        }
        if(ep&&FILES[nc]===ep[0]&&nr===+(ep[1])-1)
          moves.push({fr:r,fc:c,tr:nr,tc:nc,ep:true});
      }
    } else if(type==='N'){
      for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
        const nr=r+dr,nc=c+dc;
        if(inBounds(nr,nc)&&colorOf(bd[nr][nc])!==clr) moves.push({fr:r,fc:c,tr:nr,tc:nc});
      }
    } else if(type==='K'){
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc) continue;
        const nr=r+dr,nc=c+dc;
        if(inBounds(nr,nc)&&colorOf(bd[nr][nc])!==clr) moves.push({fr:r,fc:c,tr:nr,tc:nc});
      }
      const opp=clr==='w'?'b':'w';
      if(clr==='w'){
        if(castling.includes('K')&&!bd[7][5]&&!bd[7][6]&&bd[7][7]==='R'&&!isAttacked(bd,7,5,opp)&&!isAttacked(bd,7,6,opp)&&!isAttacked(bd,7,4,opp))
          moves.push({fr:7,fc:4,tr:7,tc:6,castle:'K'});
        if(castling.includes('Q')&&!bd[7][3]&&!bd[7][2]&&!bd[7][1]&&bd[7][0]==='R'&&!isAttacked(bd,7,3,opp)&&!isAttacked(bd,7,2,opp)&&!isAttacked(bd,7,4,opp))
          moves.push({fr:7,fc:4,tr:7,tc:2,castle:'Q'});
      } else {
        if(castling.includes('k')&&!bd[0][5]&&!bd[0][6]&&bd[0][7]==='r'&&!isAttacked(bd,0,5,opp)&&!isAttacked(bd,0,6,opp)&&!isAttacked(bd,0,4,opp))
          moves.push({fr:0,fc:4,tr:0,tc:6,castle:'k'});
        if(castling.includes('q')&&!bd[0][3]&&!bd[0][2]&&!bd[0][1]&&bd[0][0]==='r'&&!isAttacked(bd,0,3,opp)&&!isAttacked(bd,0,2,opp)&&!isAttacked(bd,0,4,opp))
          moves.push({fr:0,fc:4,tr:0,tc:2,castle:'q'});
      }
    } else {
      const dirs=[];
      if(type==='B'||type==='Q') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
      if(type==='R'||type==='Q') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for(const[dr,dc]of dirs){
        let nr=r+dr,nc=c+dc;
        while(inBounds(nr,nc)){
          const tgt=bd[nr][nc];
          if(tgt){if(colorOf(tgt)!==clr) moves.push({fr:r,fc:c,tr:nr,tc:nc});break}
          moves.push({fr:r,fc:c,tr:nr,tc:nc});
          nr+=dr;nc+=dc;
        }
      }
    }
  }
  return moves;
}

function isAttacked(bd,r,c,byColor){
  // Pawn
  const pDir=byColor==='w'?-1:1;
  for(const dc of[-1,1]){
    const pr=r+pDir,pc=c+dc;
    if(inBounds(pr,pc)){const pp=bd[pr][pc];if(pp&&colorOf(pp)===byColor&&pp.toUpperCase()==='P') return true}
  }
  // Knight
  for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
    const nr=r+dr,nc=c+dc;
    if(inBounds(nr,nc)){const pp=bd[nr][nc];if(pp&&colorOf(pp)===byColor&&pp.toUpperCase()==='N') return true}
  }
  // King
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if(inBounds(nr,nc)){const pp=bd[nr][nc];if(pp&&colorOf(pp)===byColor&&pp.toUpperCase()==='K') return true}
  }
  // Sliding
  const slides=[{d:[[-1,-1],[-1,1],[1,-1],[1,1]],t:['B','Q']},{d:[[-1,0],[1,0],[0,-1],[0,1]],t:['R','Q']}];
  for(const{d,t}of slides){
    for(const[dr,dc]of d){
      let nr=r+dr,nc=c+dc;
      while(inBounds(nr,nc)){
        const pp=bd[nr][nc];
        if(pp){if(colorOf(pp)===byColor&&t.includes(pp.toUpperCase())) return true;break}
        nr+=dr;nc+=dc;
      }
    }
  }
  return false;
}

function findKing(bd,clr){
  const k=clr==='w'?'K':'k';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++) if(bd[r][c]===k) return[r,c];
  return null;
}

function inCheck(bd,clr){
  const kp=findKing(bd,clr);
  if(!kp) return false;
  return isAttacked(bd,kp[0],kp[1],clr==='w'?'b':'w');
}

function applyMove(bd,m){
  const nb=bd.map(r=>[...r]);
  if(m.castle){
    const row=m.fr;
    const piece=nb[m.fr][m.fc];
    nb[m.fr][m.fc]=null;
    nb[m.tr][m.tc]=piece;
    if(m.tc===6){nb[m.fr][5]=nb[m.fr][7];nb[m.fr][7]=null}
    else if(m.tc===2){nb[m.fr][3]=nb[m.fr][0];nb[m.fr][0]=null}
    return nb;
  }
  if(m.ep){
    nb[m.tr][m.tc]=nb[m.fr][m.fc];
    nb[m.fr][m.fc]=null;
    nb[m.fr][m.tc]=null;
  } else {
    nb[m.tr][m.tc]=m.promo||nb[m.fr][m.fc];
    nb[m.fr][m.fc]=null;
  }
  return nb;
}

function legalMoves(bd,clr,ep){
  const pseudo=pseudoMoves(bd,clr,ep);
  const legal=[];
  for(const m of pseudo){
    const nb=applyMove(bd,m);
    if(!inCheck(nb,clr)) legal.push(m);
  }
  return legal;
}

function hasLegalMoves(bd,clr,ep){return legalMoves(bd,clr,ep).length>0}

// ─── Evaluation ──────────────────────────────────────────
function evaluate(bd, clr){
  let mgScore=0, egScore=0;
  let phase=0;

  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=bd[r][c];
    if(!p) continue;
    const isW=p===p.toUpperCase();
    const val=PIECE_VAL[p.toUpperCase()];
    const material=clr==='w'?val:-val;
    phase+=PHASE_VAL[p.toUpperCase()];

    // PST: White from top-left, Black mirrored
    const idx=isW? r*8+c : (7-r)*8+c;
    const mgPst = PST_MG[p.toUpperCase()][idx];
    const egPst = PST_EG[p.toUpperCase()][idx];

    if(isW){
      mgScore += val + mgPst;
      egScore += val + egPst;
    } else {
      mgScore -= val + mgPst;
      egScore -= val + egPst;
    }
  }

  // Phase interpolation (tapered eval)
  if(phase>24) phase=24;
  const mgPhase=phase/24;
  const egPhase=1-mgPhase;
  let score = Math.floor(mgScore*mgPhase + egScore*egPhase);

  return clr==='w'?score:-score;
}

// ─── Engine: Alpha-Beta with improvements ────────────────
let killerMoves=[], historyTable=[];

function initKillers(){
  killerMoves=[]; historyTable=[];
  for(let i=0;i<64;i++){killerMoves.push([null,null]);historyTable.push(new Array(64).fill(0))}
}

function scoreMove(m,bd){
  let s=0;
  const captured=bd[m.tr][m.tc];
  if(m.promo) s+=PIECE_VAL[m.promo.toUpperCase()];
  if(captured){
    s+=10*PIECE_VAL[captured.toUpperCase()]-PIECE_VAL[board[m.fr][m.fc].toUpperCase()];
  }
  if(killerMoves[0][m.fr*8+m.fc]&&killerMoves[0][m.fr*8+m.fc].tr===m.tr&&killerMoves[0][m.fr*8+m.fc].tc===m.tc) s+=8;
  else if(killerMoves[1][m.fr*8+m.fc]&&killerMoves[1][m.fr*8+m.fc].tr===m.tr&&killerMoves[1][m.fr*8+m.fc].tc===m.tc) s+=7;
  s+=historyTable[m.fr*8+m.fc][m.tr*8+m.tc]||0;
  return s;
}

function orderMoves(moves,bd){
  return moves.sort((a,b)=>scoreMove(b,bd)-scoreMove(a,bd));
}

function quiescence(bd,clr,ep,alpha,beta,depth){
  engineNodes++;
  if(engineNodes%1024===0&&(Date.now()-engineStart)>engineTimeLimit) return 0;

  const standPat=evaluate(bd,clr);
  if(standPat>=beta) return beta;
  if(depth<=0) return standPat>alpha?standPat:alpha;

  const moves=pseudoMoves(bd,clr,ep);
  const captures=moves.filter(m=>bd[m.tr][m.tc]||m.ep||m.promo);
  orderMoves(captures,bd);

  for(let i=0;i<captures.length&&i<10;i++){
    const m=captures[i];
    const capturedPiece=bd[m.tr][m.tc];
    if(m.promo&&m.promo.toUpperCase()!=='Q') continue;
    if(!m.ep&&!m.promo&&capturedPiece){
      const gain=PIECE_VAL[capturedPiece.toUpperCase()];
      const loss=PIECE_VAL[bd[m.fr][m.fc].toUpperCase()];
      if(standPat+gain-loss+200<alpha) continue;
    }
    const nb=applyMove(bd,m);
    if(inCheck(nb,clr)) continue;

    const nextEp=m.ep?null:null;
    const score=-quiescence(nb,clr==='w'?'b':'w',nextEp,-beta,-alpha,depth-1);
    if(score>=beta) return beta;
    if(score>alpha) alpha=score;
  }
  return alpha;
}

function alphaBeta(bd,clr,dep,ep,alpha,beta,isRoot){
  engineNodes++;
  if(engineNodes%1024===0&&(Date.now()-engineStart)>engineTimeLimit) return 0;

  if(dep<=0) return quiescence(bd,clr,ep,alpha,beta,2);

  const moves=legalMoves(bd,clr,ep);
  if(moves.length===0){
    if(inCheck(bd,clr)) return -19999;
    return 0;
  }

  if(!isRoot) orderMoves(moves,bd);

  let bestScore=-Infinity;
  const opp=clr==='w'?'b':'w';

  for(let i=0;i<moves.length;i++){
    const m=moves[i];
    const nb=applyMove(bd,m);
    const nextEp=m.ep?null:(movingPieceUp2(m,bd)?(FILES[m.fc]+''+(8-(m.fr+m.tr)/2)):null);

    let score;
    if(i===0){
      score=-alphaBeta(nb,opp,dep-1,nextEp,-beta,-alpha,false);
    } else {
      let reduction=0;
      if(dep>=3&&i>=4&&!inCheck(bd,clr)&&!bd[m.tr][m.tc]&&!m.promo&&!m.ep) reduction=1;
      score=-alphaBeta(nb,opp,dep-1-reduction,nextEp,-alpha-1,-alpha,false);
      if(score>alpha&&score<beta) score=-alphaBeta(nb,opp,dep-1,nextEp,-beta,-alpha,false);
    }

    if(score>bestScore) bestScore=score;
    if(score>alpha) alpha=score;
    if(alpha>=beta){
      if(!bd[m.tr][m.tc]){
        killerMoves[1][m.fr*8+m.fc]=killerMoves[0][m.fr*8+m.fc];
        killerMoves[0][m.fr*8+m.fc]={tr:m.tr,tc:m.tc};
        historyTable[m.fr*8+m.fc][m.tr*8+m.tc]+=dep*dep;
      }
      return beta;
    }
  }
  return bestScore;
}

function movingPieceUp2(m,bd){
  const p=bd[m.fr][m.fc];
  return p&&p.toUpperCase()==='P'&&Math.abs(m.tr-m.fr)===2;
}

let engineTimeLimit=2000;

function findBestMove(bd,clr,maxDepth){
  initKillers();
  engineNodes=0;
  engineStart=Date.now();
  engineTimeLimit=maxDepth<=3?1500:maxDepth<=4?2000:maxDepth<=5?3000:4000;

  const moves=legalMoves(bd,clr,null);
  if(moves.length===0) return null;
  if(moves.length===1) return moves[0];

  let bestMove=moves[0];
  let bestScore=-Infinity;

  for(let d=1;d<=maxDepth;d++){
    let currentBest=null;
    let currentScore=-Infinity;
    let aborting=false;

    for(const m of moves){
      const nb=applyMove(bd,m);
      const opp=clr==='w'?'b':'w';
      const nextEp=m.ep?null:(movingPieceUp2(m,bd)?(FILES[m.fc]+''+(8-(m.fr+m.tr)/2)):null);
      const score=-alphaBeta(nb,opp,d-1,nextEp,-Infinity,-Infinity+1,false);
      if(score===null||score===undefined){aborting=true;break}
      if(score>currentScore){currentScore=score;currentBest=m}
    }

    if(aborting) break;
    if(currentBest){
      bestMove=currentBest;
      bestScore=currentScore;
    }

    const elapsed=Date.now()-engineStart;
    updateEngineInfo(bestScore,d,engineNodes,elapsed);
    if(Math.abs(bestScore)>19000) break;
    if(elapsed>engineTimeLimit) break;
  }

  return bestMove;
}

// ─── Move Execution ──────────────────────────────────────
function makeMove(m){
  const snapshot={board:board.map(r=>[...r]),turn,castling,epSquare,halfmove,fullmove,
    whiteCaptures:[...whiteCaptures],blackCaptures:[...blackCaptures],lastMove,historyLen:historyStack.length};
  historyStack.push(snapshot);

  const movingPiece=board[m.fr][m.fc];
  const captured=board[m.tr][m.tc];

  if(captured){
    if(colorOf(captured)==='w') whiteCaptures.push(captured);
    else blackCaptures.push(captured);
  }
  if(m.ep){
    const epCap=board[m.fr][m.tc];
    if(epCap){
      if(colorOf(epCap)==='w') whiteCaptures.push(epCap);
      else blackCaptures.push(epCap);
    }
  }

  if(m.castle){
    board[m.fr][m.fc]=null;
    board[m.tr][m.tc]=movingPiece;
    if(m.tc===6){board[m.fr][5]=board[m.fr][7];board[m.fr][7]=null}
    else if(m.tc===2){board[m.fr][3]=board[m.fr][0];board[m.fr][0]=null}
  } else if(m.ep){
    board[m.tr][m.tc]=m.promo||movingPiece;
    board[m.fr][m.fc]=null;
    board[m.fr][m.tc]=null;
  } else {
    board[m.tr][m.tc]=m.promo||movingPiece;
    board[m.fr][m.fc]=null;
  }

  // Castling rights
  if(movingPiece.toUpperCase()==='K'){
    if(colorOf(movingPiece)==='w') castling=castling.replace('K','').replace('Q','');
    else castling=castling.replace('k','').replace('q','');
  }
  if(movingPiece.toUpperCase()==='R'){
    if(m.fr===7&&m.fc===7) castling=castling.replace('K','');
    if(m.fr===7&&m.fc===0) castling=castling.replace('Q','');
    if(m.fr===0&&m.fc===7) castling=castling.replace('k','');
    if(m.fr===0&&m.fc===0) castling=castling.replace('q','');
  }
  if(m.tr===0&&m.tc===0) castling=castling.replace('q','');
  if(m.tr===0&&m.tc===7) castling=castling.replace('k','');
  if(m.tr===7&&m.tc===0) castling=castling.replace('Q','');
  if(m.tr===7&&m.tc===7) castling=castling.replace('K','');
  if(!castling) castling='-';

  // En passant
  if(movingPiece.toUpperCase()==='P'&&Math.abs(m.tr-m.fr)===2)
    epSquare=FILES[m.fc]+(8-(m.fr+m.tr)/2);
  else epSquare=null;

  if(movingPiece.toUpperCase()==='P'||captured||m.ep) halfmove=0;
  else halfmove++;
  if(turn==='b') fullmove++;

  lastMove={fr:m.fr,fc:m.fc,tr:m.tr,tc:m.tc};
  turn=turn==='w'?'b':'w';

  selectedSq=null;
  legalMovesForSelected=[];
}

// ─── Notation ────────────────────────────────────────────
function sqName(r,c){return FILES[c]+(8-r)}

function moveToSAN(m,piece,captured,promo){
  if(m.castle) return m.tc===6?'O-O':'O-O-O';
  let san='';
  const type=piece.toUpperCase();
  if(type!=='P') san+=type;
  if(captured){
    if(type==='P') san+=FILES[m.fc];
    san+='x';
  }
  san+=sqName(m.tr,m.tc);
  if(m.promo) san+='='+m.promo.toUpperCase();
  // Check/mate
  const nb=applyMove(board,m);
  const opp=turn==='w'?'b':'w';
  if(inCheck(nb,opp)){
    if(!hasLegalMoves(nb,opp,epSquare)) san+='#';
    else san+='+';
  }
  return san;
}

// ─── Rendering ───────────────────────────────────────────
const boardEl=document.getElementById('board');
const statusText=document.getElementById('status-text');
const statusDot=document.getElementById('status-dot');

function renderBoard(){
  // Remove old squares (keep thinking overlay)
  boardEl.querySelectorAll('.square').forEach(el=>el.remove());

  for(let dr=0;dr<8;dr++) for(let dc=0;dc<8;dc++){
    const r=boardFlipped?7-dr:dr;
    const c=boardFlipped?7-dc:dc;
    const sq=document.createElement('div');
    const isLight=(r+c)%2===0;
    sq.className='square '+(isLight?'light':'dark');
    sq.dataset.r=r;sq.dataset.c=c;

    if(selectedSq&&selectedSq[0]===r&&selectedSq[1]===c) sq.classList.add('selected');
    if(lastMove){
      if(lastMove.fr===r&&lastMove.fc===c) sq.classList.add('last-from');
      if(lastMove.tr===r&&lastMove.tc===c) sq.classList.add('last-to');
    }
    const piece=board[r][c];
    if(piece&&piece.toUpperCase()==='K'&&colorOf(piece)===turn&&inCheck(board,turn))
      sq.classList.add('in-check');

    // Coords
    if(dc===0){const rk=document.createElement('span');rk.className='coord coord-rank';rk.textContent=8-r;sq.appendChild(rk)}
    if(dr===7){const fl=document.createElement('span');fl.className='coord coord-file';fl.textContent=FILES[c];sq.appendChild(fl)}

    // Piece
    if(piece){
      const sp=document.createElement('span');
      sp.className='piece '+(isWhite(piece)?'piece-white':'piece-black');
      sp.textContent=UNICODE[piece];
      sq.appendChild(sp);
    }

    // Legal targets
    if(legalMovesForSelected.some(m=>m.tr===r&&m.tc===c)){
      sq.classList.add('legal-target');
      if(piece) sq.classList.add('has-piece');
      else{
        const dot=document.createElement('div');dot.className='move-dot';sq.appendChild(dot);
      }
    }

    sq.addEventListener('click',()=>onSquareClick(r,c));
    boardEl.appendChild(sq);
  }

  renderLabels();
  renderHistory();
  updateCaptures();
  updateStatus();
  updateTimerDisplay();
}

function renderLabels(){
  const fl=document.getElementById('file-labels');
  const rl=document.getElementById('rank-labels');
  fl.innerHTML='';rl.innerHTML='';
  const files=boardFlipped?[...FILES].reverse():FILES.split('');
  const ranks=boardFlipped?['1','2','3','4','5','6','7','8']:['8','7','6','5','4','3','2','1'];
  for(const f of files){const s=document.createElement('span');s.textContent=f;fl.appendChild(s)}
  for(const r of ranks){const s=document.createElement('span');s.textContent=r;rl.appendChild(s)}
}

function renderHistory(){
  const el=document.getElementById('move-history');
  el.innerHTML='';
  const len=historyStack.length;
  for(let i=0;i<len;i+=2){
    const row=document.createElement('div');row.className='move-row';
    const num=document.createElement('span');num.className='move-num';
    num.textContent=(Math.floor(i/2)+1)+'.';row.appendChild(num);

    const wc=document.createElement('span');wc.className='move-cell';
    if(historyStack[i]) wc.textContent=historyStack[i].san;
    row.appendChild(wc);

    const bc=document.createElement('span');bc.className='move-cell';
    if(historyStack[i+1]) bc.textContent=historyStack[i+1].san;
    row.appendChild(bc);
    el.appendChild(row);
  }
  el.scrollTop=el.scrollHeight;
}

const PIECE_VALUES_ORDER={Q:90,R:50,B:30,N:30,P:10,q:90,r:50,b:30,n:30,p:10};
function sortCaptures(arr){return[...arr].sort((a,b)=>(PIECE_VALUES_ORDER[b]||0)-(PIECE_VALUES_ORDER[a]||0))}

function updateCaptures(){
  const wc=sortCaptures(whiteCaptures);
  const bc=sortCaptures(blackCaptures);
  const wExtra=wc.length>5?wc.length-5:0;
  const bExtra=bc.length>5?bc.length-5:0;
  document.getElementById('captures-white').innerHTML=
    wc.slice(0,5).map(p=>`<span class="piece-white">${UNICODE[p]}</span>`).join('')+(wExtra?`<span class="extra">+${wExtra}</span>`:'');
  document.getElementById('captures-black').innerHTML=
    bc.slice(0,5).map(p=>`<span class="piece-black">${UNICODE[p]}</span>`).join('')+(bExtra?`<span class="extra">+${bExtra}</span>`:'');
}

function setStatus(text,dotColor){
  statusText.textContent=text;
  statusDot.className='status-dot '+dotColor;
}

function updateStatus(){
  if(gameOver) return;
  const isPlayerTurn=(turn===playerColor);
  const check=inCheck(board,turn);
  if(isPlayerTurn){
    setStatus('Sua vez — '+(turn==='w'?'Brancas':'Pretas')+(check?' — Xeque!':''),check?'yellow':'green');
  } else {
    setStatus('Máquina calculando...',check?'yellow':'red');
  }
  document.getElementById('panel-white').classList.toggle('active',turn==='w');
  document.getElementById('panel-black').classList.toggle('active',turn==='b');
  document.getElementById('engine-info').style.display=(turn!==playerColor)?'block':'none';
}

function updateEngineInfo(score,depth,nodes,time){
  const evalEl=document.getElementById('eval-score');
  const depthEl=document.getElementById('eval-depth');
  const npsEl=document.getElementById('eval-nps');
  const timeEl=document.getElementById('eval-time');
  const mateScore=score>19000?`M${Math.ceil((20001-score)/2)}`:score<-19000?`-M${Math.ceil((20001+score)/2)}`:(score/100).toFixed(2);
  evalEl.textContent=mateScore;
  evalEl.style.color=score>0?'var(--green)':score<0?'var(--red)':'var(--text2)';
  depthEl.textContent=depth;
  const nps=Math.floor(nodes/(time/1000)||1);
  npsEl.textContent=nps.toLocaleString();
  timeEl.textContent=time+'ms';
}

// ─── Click Handler ───────────────────────────────────────
function onSquareClick(r,c){
  if(gameOver||aiThinking) return;
  if(turn!==playerColor) return;

  const piece=board[r][c];

  if(selectedSq){
    const moves=legalMovesForSelected.filter(m=>m.tr===r&&m.tc===c);
    if(moves.length===0){
      if(piece&&colorOf(piece)===turn){
        selectedSq=[r,c];
        legalMovesForSelected=legalMoves(board,turn,epSquare).filter(m=>m.fr===r&&m.fc===c);
        renderBoard();
      } else {
        selectedSq=null;legalMovesForSelected=[];
        renderBoard();
      }
      return;
    }
    if(moves.length===1){
      executePlayerMove(moves[0]);
    } else {
      showPromotionModal(moves);
    }
    return;
  }

  if(piece&&colorOf(piece)===turn){
    selectedSq=[r,c];
    legalMovesForSelected=legalMoves(board,turn,epSquare).filter(m=>m.fr===r&&m.fc===c);
    renderBoard();
  }
}

function executePlayerMove(m){
  const movingPiece=board[m.fr][m.fc];
  const captured=board[m.tr][m.tc]||m.ep?board[m.fr][m.tc]:null;
  const san=moveToSAN(m,movingPiece,captured||board[m.tr][m.tc],m.promo);

  makeMove(m);
  historyStack[historyStack.length-1].san=san;

  renderBoard();
  checkGameOver()||triggerAIMove();
}

function showPromotionModal(moves){
  const modal=document.getElementById('promo-modal');
  const opts=document.getElementById('promo-options');
  opts.innerHTML='';
  const types=['Q','R','B','N'];
  const clr=turn;
  for(const t of types){
    const btn=document.createElement('button');
    btn.className='promo-btn';
    const p=clr==='w'?t:t.toLowerCase();
    btn.textContent=UNICODE[p];
    btn.style.color=clr==='w'?'#fff':'#1a1a1a';
    btn.style.textShadow=clr==='w'?'0 0 3px rgba(0,0,0,.9),0 0 1px #000,1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000':'0 0 2px rgba(255,255,255,.3)';
    btn.onclick=()=>{
      modal.classList.remove('visible');
      const m2=moves.find(mv=>mv.promo===p);
      if(m2) executePlayerMove(m2);
    };
    opts.appendChild(btn);
  }
  modal.classList.add('visible');
}

// ─── AI Turn ─────────────────────────────────────────────
function triggerAIMove(){
  if(gameOver) return;
  if(turn===playerColor){renderBoard();return}

  aiThinking=true;
  const overlay=document.getElementById('thinking-overlay');
  overlay.classList.add('visible');
  document.getElementById('engine-info').style.display='block';
  updateStatus();

  setTimeout(()=>{
    try{
      const aiColor=playerColor==='w'?'b':'w';
      const bestMove=findBestMove(board,aiColor,difficulty);

      aiThinking=false;
      overlay.classList.remove('visible');

      if(!bestMove||gameOver){
        checkGameOver();
        renderBoard();
        return;
      }

      const movingPiece=board[bestMove.fr][bestMove.fc];
      const captured=board[bestMove.tr][bestMove.tc]||bestMove.ep?board[bestMove.fr][bestMove.tc]:null;
      const san=moveToSAN(bestMove,movingPiece,captured||board[bestMove.tr][bestMove.tc],bestMove.promo);

      makeMove(bestMove);
      historyStack[historyStack.length-1].san=san;

      renderBoard();
      checkGameOver();
    }catch(e){
      console.error('Engine error:',e);
      aiThinking=false;
      overlay.classList.remove('visible');
      // Make a random legal move as fallback
      const aiColor=playerColor==='w'?'b':'w';
      const fallbackMoves=legalMoves(board,aiColor,null);
      if(fallbackMoves.length>0){
        const m=fallbackMoves[Math.floor(Math.random()*fallbackMoves.length)];
        makeMove(m);
        historyStack[historyStack.length-1].san='...';
      }
      renderBoard();
      checkGameOver();
    }
  },50);
}

// ─── Game Over ───────────────────────────────────────────
function checkGameOver(){
  if(gameOver) return true;
  if(!hasLegalMoves(board,turn,epSquare)){
    gameOver=true;
    stopTimer();
    if(inCheck(board,turn)){
      const winner=turn==='w'?'Pretas':'Brancas';
      const isPlayerWin=(turn!==playerColor);
      showGameOver(
        isPlayerWin?'🏆':'😞',
        isPlayerWin?'Vitória!':'Derrota',
        `${winner} venceram por cheque-mate!`
      );
    } else {
      showGameOver('🤝','Empate','Afogamento — Rei sem movimentos legais');
    }
    return true;
  }
  if(halfmove>=100){
    gameOver=true;stopTimer();
    showGameOver('🤝','Empate','Regra das 50 jogadas');
    return true;
  }
  // Insufficient material
  const pieces={w:[],b:[]};
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=board[r][c];
    if(p&&p.toUpperCase()!=='K'&&p.toUpperCase()!=='P') pieces[colorOf(p)].push(p.toUpperCase());
  }
  if(pieces.w.length===0&&pieces.b.length===0){
    gameOver=true;stopTimer();showGameOver('🤝','Empate','Material insuficiente');return true;
  }
  if(pieces.w.length===0&&pieces.b.length===1&&['B','N'].includes(pieces.b[0])){
    gameOver=true;stopTimer();showGameOver('🤝','Empate','Material insuficiente');return true;
  }
  if(pieces.b.length===0&&pieces.w.length===1&&['B','N'].includes(pieces.w[0])){
    gameOver=true;stopTimer();showGameOver('🤝','Empate','Material insuficiente');return true;
  }
  return false;
}

function showGameOver(icon,title,desc){
  document.getElementById('result-icon').textContent=icon;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-desc').textContent=desc;
  document.getElementById('gameover-modal').classList.add('visible');
}

function closeModal(id){document.getElementById(id).classList.remove('visible')}

// ─── Timer ───────────────────────────────────────────────
function startTimer(){
  stopTimer();
  if(timerMinutes<=0) return;
  timerInterval=setInterval(()=>{
    if(gameOver||aiThinking) return;
    if(turn==='w') whiteTime--;else blackTime--;
    if(whiteTime<=0){whiteTime=0;gameOver=true;stopTimer();
      showGameOver('⏰','Tempo Esgotado','Brancas perderam por tempo')}
    if(blackTime<=0){blackTime=0;gameOver=true;stopTimer();
      showGameOver('⏰','Tempo Esgotado','Pretas perderam por tempo')}
    updateTimerDisplay();
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null}
function updateTimerDisplay(){
  const fmt=t=>{const m=Math.floor(t/60);const s=t%60;return`${m}:${String(s).padStart(2,'0')}`};
  const wt=document.getElementById('timer-white');
  const bt=document.getElementById('timer-black');
  wt.textContent=fmt(whiteTime);
  bt.textContent=fmt(blackTime);
  wt.classList.toggle('low-time',whiteTime<=30&&timerMinutes>0);
  bt.classList.toggle('low-time',blackTime<=30&&timerMinutes>0);
}

// ─── Actions ─────────────────────────────────────────────
function newGame(){
  closeModal('gameover-modal');
  const p=parseFEN('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
  board=p.board;turn=p.turn;castling=p.castling;epSquare=p.ep;halfmove=p.halfmove;fullmove=p.fullmove;
  selectedSq=null;legalMovesForSelected=[];lastMove=null;
  historyStack=[];whiteCaptures=[];blackCaptures=[];
  gameOver=false;aiThinking=false;
  whiteTime=timerMinutes*60;blackTime=timerMinutes*60;
  startTimer();renderBoard();
  if(playerColor==='b') triggerAIMove();
}

function undoMove(){
  if(aiThinking||gameOver) return;
  // Undo AI + player move (2 moves back)
  if(historyStack.length<2) return;
  // Find last state before AI moved
  const targetLen=historyStack.length-2;
  while(historyStack.length>targetLen){
    const s=historyStack.pop();
    board=s.board;turn=s.turn;castling=s.castling;epSquare=s.epSquare;
    halfmove=s.halfmove;fullmove=s.fullmove;
    whiteCaptures=s.whiteCaptures;blackCaptures=s.blackCaptures;
    lastMove=s.lastMove;
  }
  selectedSq=null;legalMovesForSelected=[];
  renderBoard();
}

function flipBoard(){boardFlipped=!boardFlipped;renderBoard()}

function resignGame(){
  if(gameOver) return;
  gameOver=true;stopTimer();
  const winner=playerColor==='w'?'Pretas':'Brancas';
  showGameOver(playerColor==='w'?'😞':'🏆',
    playerColor==='w'?'Derrota':'Vitória',
    `${winner} venceram por rendição`);
}

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('open');
}

function onDifficultyChange(){
  const v=document.getElementById('difficulty').value;
  const badges=document.getElementById('diff-badge');
  const labels={1:'FÁCIL',2:'MÉDIO',3:'DIFÍCIL',4:'EXPERT'};
  const classes={1:'easy',2:'medium',3:'hard',4:'expert'};
  const depths={1:3,2:4,3:5,4:6};
  difficulty=depths[+v];
  badges.textContent=labels[+v];
  badges.className='diff-badge '+classes[+v];
}

function onTimerChange(){
  const v=+document.getElementById('timer-setting').value;
  timerMinutes=v;
}

function onColorChange(){
  playerColor=document.getElementById('player-color').value;
  newGame();
}

// ─── Keyboard ────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undoMove()}
  if(e.key==='Escape'){closeModal('gameover-modal');closeModal('promo-modal')}
});

// ─── Init ────────────────────────────────────────────────
newGame();
</script>
