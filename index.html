<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xadrez Pro - Corrigido</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--sf:rgba(22,27,34,.92);--sf2:#161b22;--sf3:#30363d;
  --ac:#58a6ff;--ac2:#1f6feb;--gn:#3fb950;--rd:#f85149;--yw:#d29922;
  --tx:#e6edf3;--t2:#8b949e;--lt:#F0D9B5;--dk:#B58863;
  --r:12px;--rs:8px;--sh:0 10px 40px rgba(0,0,0,.65)
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
body{display:flex;justify-content:center;align-items:center;background:linear-gradient(160deg,#0b0e14 0%,#0d1117 40%,#161b22 100%)}
.app{display:grid;grid-template-columns:240px 1fr 240px;grid-template-rows:auto 1fr;gap:0;height:100vh;max-width:1440px;width:100%}
.hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--sf3);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.logo-i{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),#a371f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(88,166,255,.3)}
.hdr-c{display:flex;align-items:center;gap:10px}
.sb{background:var(--sf);padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;backdrop-filter:blur(12px)}
.sb-l{border-right:1px solid var(--sf3)}.sb-r{border-left:1px solid var(--sf3)}
.pp{border-radius:var(--r);padding:12px;background:var(--sf2);border:2px solid transparent;transition:all .25s ease}
.pp.on{border-color:var(--ac);box-shadow:0 0 20px rgba(88,166,255,.06)}
.pp.on .ind{background:var(--gn);box-shadow:0 0 8px rgba(63,185,80,.5)}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ind{width:9px;height:9px;border-radius:50%;background:var(--sf3);transition:all .25s}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.pn{font-size:13px;font-weight:600;flex:1}
.pt{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:26px;font-weight:700;letter-spacing:2px;text-align:center;margin:4px 0}
.pt.lt{color:var(--rd);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.pcs{display:flex;flex-wrap:wrap;gap:1px;min-height:22px;margin-top:4px}
.pcs svg{width:26px;height:34px}
.ei{margin-top:6px;padding-top:6px;border-top:1px solid var(--sf3)}
.el{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);line-height:1.7}
.el .v{color:var(--tx);font-weight:600;font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.ct{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px}
.ba{position:relative}
.fl{display:flex;padding:0 0 4px}
.fl span{width:calc(min(720px,calc(100vh - 100px))/8);text-align:center;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase}
.rl{position:absolute;left:-22px;top:0;bottom:0;display:flex;flex-direction:column}
.rl span{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);width:18px}
.bd{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(720px,calc(100vh - 100px));aspect-ratio:1;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh),0 0 0 1px rgba(255,255,255,.04);user-select:none;position:relative;touch-action:none}
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s ease;overflow:hidden}
.sq.l{background:var(--lt)}
.sq.d{background:var(--dk)}
.sq.sel{background:rgba(20,110,45,.55)!important}
.sq.last-from{background:rgba(255,220,50,.35)!important}
.sq.last-to{background:rgba(255,220,50,.45)!important}
.sq.chk{background:radial-gradient(ellipse at center,rgba(255,30,30,.7) 0%,rgba(255,0,0,.25) 60%,transparent 100%)!important}
.sq .dot{position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(0,0,0,.25);z-index:1;pointer-events:none}
.sq .ring{position:absolute;width:84%;height:84%;border-radius:50%;border:5px solid rgba(0,0,0,.25);z-index:1;pointer-events:none}
.sq .pw{position:relative;z-index:2;pointer-events:none;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;transition:transform .15s ease-out}
.sq:hover .pw{transform:scale(1.06)}
.sq .pw svg{width:88%;height:88%;overflow:visible;pointer-events:none}
.sq.drag-over{outline:3px solid var(--ac);outline-offset:-3px;z-index:5}
.cd{position:absolute;font-size:10px;font-weight:700;z-index:3;pointer-events:none;opacity:.65}
.cf{bottom:2px;right:4px}.cr{top:2px;left:4px}
.sq.l .cd{color:var(--dk)}.sq.d .cd{color:var(--lt)}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.92;transform:scale(1.15);filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));display:flex;align-items:center;justify-content:center}
.drag-ghost svg{width:88%;height:88%;overflow:visible}
.sq .pw img{width:88%;height:88%;object-fit:contain;pointer-events:none}
.drag-ghost img{width:88%;height:88%;object-fit:contain}
.pcs img{width:26px;height:34px;object-fit:contain}
.pbtn img{width:56px;height:56px;object-fit:contain}

.st{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sf);border-radius:var(--r);font-size:13px;min-height:38px;border:1px solid var(--sf3);width:100%;max-width:min(720px,calc(100vh - 100px))}
.sd{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;flex-shrink:0}
.sd.g{background:var(--gn);color:var(--gn)}.sd.r{background:var(--rd);color:var(--rd)}.sd.y{background:var(--yw);color:var(--yw)}
.stx{flex:1;font-weight:500}
.bg{display:flex;gap:6px;flex-wrap:wrap}
.bt{padding:7px 14px;border:1px solid var(--sf3);border-radius:var(--rs);background:var(--sf2);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s ease;text-transform:uppercase;letter-spacing:.5px}
.bt:hover{background:var(--sf3)}.bt:active{transform:scale(.96)}
.bt.pr{background:linear-gradient(135deg,var(--ac2),#a371f7);border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(31,111,235,.3)}
.bt.dg{border-color:var(--rd);color:var(--rd)}.bt.dg:hover{background:rgba(248,81,73,.1)}
.hp{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hp h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:6px}
.mh{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.mr{display:grid;grid-template-columns:28px 1fr 1fr;gap:1px;font-size:12px;font-family:'SF Mono',monospace}
.mn{color:var(--sf3);text-align:right;padding-right:6px;line-height:24px}
.mc{padding:2px 6px;border-radius:4px;line-height:24px}
.mc.cur{background:rgba(88,166,255,.12);color:var(--ac)}
.db{display:inline-flex;align-items:center;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase}
.db.e{background:rgba(63,185,80,.15);color:var(--gn)}.db.m{background:rgba(210,153,34,.15);color:var(--yw)}.db.h{background:rgba(219,109,40,.15);color:#db6d28}.db.x{background:rgba(248,81,73,.15);color:var(--rd)}
.sp{padding:10px;background:var(--sf2);border-radius:var(--r);display:none;border:1px solid var(--sf3);margin-top:4px}
.sp.open{display:block}
.sr{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px}
.sr label{color:var(--t2)}.sr select{background:var(--sf3);border:1px solid var(--sf3);color:var(--tx);border-radius:var(--rs);padding:4px 8px;font-size:12px;min-width:100px;cursor:pointer}
.to{position:absolute;inset:0;background:rgba(0,0,0,.15);display:none;align-items:center;justify-content:center;border-radius:var(--r);z-index:20;backdrop-filter:blur(3px)}
.to.vis{display:flex}
.tt{background:rgba(22,27,34,.95);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);border:1px solid var(--sf3)}
.td{display:flex;gap:5px}.td span{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:bnc .6s infinite}
.td span:nth-child(2){animation-delay:.15s}.td span:nth-child(3){animation-delay:.3s}
@keyframes bnc{50%{transform:translateY(-5px)}}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(6px)}
.mo.vis{display:flex}
.mdl{background:rgba(22,27,34,.96);border:1px solid var(--sf3);border-radius:16px;padding:32px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.6);min-width:300px}
.mdl h2{font-size:24px;margin-bottom:8px}.mdl p{color:var(--t2);margin-bottom:20px;font-size:14px}
.mdl .ri{font-size:48px;margin-bottom:12px}
.pm{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(6px)}
.pm.vis{display:flex}
.pbx{background:rgba(22,27,34,.96);border:1px solid var(--sf3);border-radius:16px;padding:24px;text-align:center}
.pbx h3{margin-bottom:16px;font-size:16px}
.pos{display:flex;gap:12px;justify-content:center}
.pbtn{width:76px;height:76px;border:2px solid var(--sf3);border-radius:var(--r);background:var(--sf2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.pbtn:hover{transform:scale(1.12);border-color:var(--ac)}
.pbtn svg{width:56px;height:72px;overflow:visible}
.sf-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(63,185,80,.12);color:var(--gn);text-transform:uppercase}
.sf-badge.off{background:rgba(248,81,73,.12);color:var(--rd)}
.sf-badge.load{background:rgba(210,153,34,.12);color:var(--yw)}
.sf-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@media(max-width:1100px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sb{flex-direction:row;flex-wrap:wrap;padding:8px;gap:8px}
  .sb-l,.sb-r{border:none}
  .bd{width:min(95vw,500px)}
  .fl span{width:calc(min(95vw,500px)/8)}
  .hp{display:none}
}
</style>
</head>

<svg style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="goldBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5DEB3"/><stop offset="25%" stop-color="#D4A574"/><stop offset="50%" stop-color="#C4963A"/><stop offset="75%" stop-color="#D4A574"/><stop offset="100%" stop-color="#B8860B"/></linearGradient>
  <radialGradient id="goldShine" cx="0.35" cy="0.25" r="0.65"><stop offset="0%" stop-color="#FFF8E7" stop-opacity="0.7"/><stop offset="40%" stop-color="#F5DEB3" stop-opacity="0.3"/><stop offset="100%" stop-color="#B8860B" stop-opacity="0"/></radialGradient>
  <linearGradient id="darkBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2A2A2A"/><stop offset="25%" stop-color="#1F1F1F"/><stop offset="50%" stop-color="#141414"/><stop offset="75%" stop-color="#0F0F0F"/><stop offset="100%" stop-color="#080808"/></linearGradient>

<div class="app">
  <div class="hdr">
    <div class="logo"><div class="logo-i">&#9819;</div>Xadrez Pro</div>
    <div class="hdr-c">
      <span class="sf-badge load" id="sfBadge"><span class="sf-dot"></span>Carregando IA...</span>

        <button class="bt" onclick="toggleCfg()">Config</button>

      </div>

  </div>
  <div class="sb sb-l">
    <div class="pp" id="pnlB">
      <div class="ph"><div class="ind"></div><div class="av" style="background:#1f6feb">&#129302;</div><span class="pn">Stockfish (Pretas)</span></div>

      <button class="bt" onclick="undo()">Desfazer</button>
      <button class="bt" onclick="flip()">Inverter</button>

      <div class="ph"><div class="ind"></div><div class="av" style="background:var(--gn)">&#128100;</div><span class="pn">Voce (Brancas)</span></div>
      <div class="pt" id="tmrW">10:00</div>
      <div class="pcs" id="capW"></div>
    </div>
  </div>
</div>

<div class="pm" id="promoM"><div class="pbx"><h3>Promover Peao</h3><div class="pos" id="promoO"></div></div></div>

function getPieceSVG(pc){
  var isW=pc===pc.toUpperCase(),type=pc.toUpperCase();
  if(type==='N'){
    var src=isW?KNIGHT_WHITE_SRC:KNIGHT_BLACK_SRC;
    return '<img src="'+src+'" style="width:88%;height:88%;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));" draggable="false">';
  }
  var paths=SVG_PIECES[type];
  if(!paths)return'';
  var body=isW?'url(#goldBody)':'url(#darkBody)',shine=isW?'url(#goldShine)':'url(#darkShine)',filter=isW?'url(#mW)':'url(#mB)',stroke=isW?'#8B6914':'#444';
  var out='<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg" style="filter:'+filter+'"><g stroke="'+stroke+'" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">';
  var parts=paths.split('/>').filter(function(s){return s.trim();});
  parts.forEach(function(p){
    p=p.trim();if(!p)return;
    if(p.indexOf('fill="none"')>=0){out+=p+'/>';}
    else{out+=p+' fill="'+body+'"/>';}
  });
  parts.forEach(function(p){
    p=p.trim();if(!p)return;
    if(p.indexOf('fill="none"')>=0)return;
    var isC=p.indexOf('<circle')>=0;
    out+=p+' fill="'+shine+'" opacity="'+(isC?'0.25':'0.3')+'"/>';
  });
  out+='</g></svg>';
  return out;
}

function pieceHTML(pc){return '<div class="pw">'+getPieceSVG(pc)+'</div>';}

var chess,flipped=false,gameOver=false,started=false,thinking=false;

function safeInitChess(){
  try{
    chess=new Chess();
    return true;
  }catch(e){
    console.error('Chess init failed',e);
    if(stxt) stxt.textContent='Erro ao carregar motor de xadrez';
    return false;
  }
}

function initStockfish(){
  updateSFBadge('load');
  // Se estiver em file://, worker de CDN falha - usa fallback direto
  if(location.protocol==='file:'){
    useFallback=true;
    updateSFBadge('off');
    return;
  }
  try{
    var sfUrl='https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js';
    stockfish=new Worker(sfUrl);
    var readyTimeout=setTimeout(function(){
      if(!stockfishReady){
        useFallback=true;
        updateSFBadge('off');
      }
    },3500);
    stockfish.onmessage=function(e){
      var line=typeof e.data==='string'?e.data:'';
      if(line==='uciok'){
        clearTimeout(readyTimeout);
        try{stockfish.postMessage('isready');}catch(x){}
      }else if(line==='readyok'){
        clearTimeout(readyTimeout);
        stockfishReady=true;
        useFallback=false;
        updateSFBadge('on');
        try{stockfish.postMessage('setoption name Skill Level value '+getSkillLevel());}catch(x){}
      }else if(line.indexOf('bestmove')===0){
        onBestMove(line);
      }else if(line.indexOf('info')===0){
        parseInfo(line);
      }
    };
    stockfish.onerror=function(){
      clearTimeout(readyTimeout);
      useFallback=true;
      updateSFBadge('off');
    };
    try{stockfish.postMessage('uci');}catch(x){useFallback=true;updateSFBadge('off');}
  }catch(e){
    useFallback=true;
    updateSFBadge('off');
  }
}
function getSkillLevel(){
  var el=document.getElementById('selDiff');
  var v=el?parseInt(el.value):2;
  return [3,10,15,20][v-1]||10;
}
function updateSFBadge(state){
  var el=document.getElementById('sfBadge');
  if(!el)return;
  if(state==='on'){el.className='sf-badge';el.innerHTML='<span class="sf-dot"></span>Stockfish OK';}
  else if(state==='off'){el.className='sf-badge off';el.innerHTML='<span class="sf-dot"></span>Fallback';}
  else{el.className='sf-badge load';el.innerHTML='<span class="sf-dot"></span>Carregando...';}
}
function parseInfo(line){
  var dm=line.match(/depth (\d+)/);
  var sc=line.match(/score (cp|mate) (-?\d+)/);
  var nd=line.match(/nodes (\d+)/);
  var tm=line.match(/time (\d+)/);
  if(dm)sfDepth=parseInt(dm[1]);
  if(nd)sfNodes=parseInt(nd[1]);
  if(tm)sfTime=parseInt(tm[1]);
  if(sc){
    if(sc[1]==='cp')sfEval=parseInt(sc[2]);
    else sfEval=parseInt(sc[2])>0?19999+parseInt(sc[2]):-19999-parseInt(sc[2]);
  }
  updEngDisplay();
}
function updEngDisplay(){
  var evStr;
  if(sfEval>19000)evStr='M'+Math.ceil((20001-sfEval)/2);
  else if(sfEval<-19000)evStr='-M'+Math.ceil((20001+sfEval)/2);
  else evStr=(sfEval/100).toFixed(2);
  var el=document.getElementById('evSc');
  if(!el)return;
  el.textContent=evStr;
  el.style.color=sfEval>0?'var(--gn)':sfEval<0?'var(--rd)':'var(--t2)';
  var dp=document.getElementById('evDp'); if(dp) dp.textContent=sfDepth;
  var ns=document.getElementById('evNs'); if(ns) ns.textContent=sfTime>0?Math.floor(sfNodes/(sfTime/1000)).toLocaleString():'0';
}
function onBestMove(line){
  var parts=line.split(' ');
  if(parts.length<2||!started){thinking=false;hideThinking();render();return;}
  var mvStr=parts[1];
  if(!mvStr || mvStr==='(none)' || mvStr.length<4){thinking=false;hideThinking();render();return;}
  var from=mvStr.substring(0,2);
  var to=mvStr.substring(2,4);
  var promo=mvStr.length>4?mvStr[4]:undefined;
  var move=chess.move({from:from,to:to,promotion:promo});
  if(move){
    lastMove={from:move.from,to:move.to};
    rebuildCaptured();
    thinking=false;hideThinking();render();startPlayerClock();checkGameOver();
  }else{
    thinking=false;hideThinking();render();
  }
}
function requestEngineMove(){
  if(!started||gameOver||chess.turn()===playerColor)return;
  thinking=true;showThinking();render();
  sfEval=0;sfDepth=0;sfNodes=0;sfTime=0;
  if(useFallback||!stockfishReady||!stockfish){
    setTimeout(function(){
      var mv=fallbackEngine();
      if(mv){
        var move=chess.move(mv);
        if(move){
          lastMove={from:move.from,to:move.to};
          rebuildCaptured();
        }
      }
      thinking=false;hideThinking();render();startPlayerClock();checkGameOver();
    },250);
    return;
  }
  try{
    stockfish.postMessage('stop');
    stockfish.postMessage('position fen '+chess.fen());
    stockfish.postMessage('go depth '+engineDepth);
  }catch(e){
    useFallback=true;updateSFBadge('off');requestEngineMove();
  }
}
function fallbackEngine(){
  var moves=chess.moves({verbose:true});
  if(moves.length===0)return null;
  var bestScore=-Infinity,bestMoves=[];
  var pieceValues={p:100,n:320,b:330,r:500,q:900,k:20000};
  moves.forEach(function(m){
    var score=0;
    if(m.captured)score+=pieceValues[m.captured]*10;
    if(m.promotion)score+=pieceValues[m.promotion]*8;
    score+=Math.random()*15;
    if(m.san.indexOf('+')>=0)score+=40;
    if(m.san.indexOf('#')>=0)score+=5000;
    if(score>bestScore){bestScore=score;bestMoves=[m];}
    else if(score===bestScore)bestMoves.push(m);
  });
  return bestMoves[Math.floor(Math.random()*bestMoves.length)];
}
function rebuildCaptured(){
  capturedW=[];capturedB=[];
  var hist=chess.history({verbose:true});
  hist.forEach(function(m){
    if(m.captured){
      if(m.color==='w') capturedW.push(m.captured);
      else capturedB.push(m.captured);
    }
  });
}
function render(){
  try{
    renderBoard();renderLabels();renderHistory();renderCaptured();updateStatus();updateClocks();
  }catch(e){console.error('render error',e); if(stxt) stxt.textContent='Erro: '+e.message;}
}
function renderBoard(){
  var thinkEl=document.getElementById('think');
  boardEl.querySelectorAll('.sq').forEach(function(e){e.remove();});
  if(thinkEl) boardEl.appendChild(thinkEl);
  var board=chess.board();
  for(var dr=0;dr<8;dr++){
    for(var dc=0;dc<8;dc++){
      var r=flipped?7-dr:dr,c=flipped?7-dc:dc;
      var sq=document.createElement('div');
      sq.className='sq '+(((r+c)%2===0)?'l':'d');
      sq.dataset.r=r;sq.dataset.c=c;
      var sqNameStr=sqName(r,c);
      if(selectedSquare&&selectedSquare===sqNameStr)sq.className+=' sel';
      if(lastMove){
        if(lastMove.from===sqNameStr)sq.className+=' last-from';
        if(lastMove.to===sqNameStr)sq.className+=' last-to';
      }
      var piece=board[r][c];
      if(piece&&piece.type==='k'&&piece.color===chess.turn()&&chess.in_check()) sq.className+=' chk';
      if(dc===0){var rk=document.createElement('span');rk.className='cd cr';rk.textContent=8-r;sq.appendChild(rk);}
      if(dr===7){var fl=document.createElement('span');fl.className='cd cf';fl.textContent=FILES[c];sq.appendChild(fl);}
      if(piece){
        var pcChar=piece.type;
        if(piece.color==='w')pcChar=pcChar.toUpperCase();
        sq.insertAdjacentHTML('beforeend',pieceHTML(pcChar));
      }
      var isLegal=selectedMoves.some(function(m){return m.to===sqNameStr;});
      if(isLegal){
        if(piece){var rg=document.createElement('div');rg.className='ring';sq.appendChild(rg);}
        else{var dt=document.createElement('div');dt.className='dot';sq.appendChild(dt);}
      }
      (function(sn,rr,cc){
        sq.addEventListener('mousedown',function(e){e.preventDefault();onSqMouseDown(sn,rr,cc,e);});
        sq.addEventListener('touchstart',function(e){if(e.touches.length===1){e.preventDefault();onSqMouseDown(sn,rr,cc,e.touches[0]);}},{passive:false});
      })(sqNameStr,r,c);
      boardEl.appendChild(sq);
    }
  }
}
function renderLabels(){
  var fl=document.getElementById('flbl'),rl=document.getElementById('rlbl');
  if(!fl||!rl)return;
  fl.innerHTML='';rl.innerHTML='';
  var fs=flipped?'hgfedcba'.split(''):'abcdefgh'.split('');
  var rs=flipped?['1','2','3','4','5','6','7','8']:['8','7','6','5','4','3','2','1'];
  fs.forEach(function(f){var s=document.createElement('span');s.textContent=f;fl.appendChild(s);});
  rs.forEach(function(r){var s=document.createElement('span');s.textContent=r;rl.appendChild(s);});
}
function renderHistory(){
  var el=document.getElementById('mhist'); if(!el) return;
  el.innerHTML='';
  var hist=chess.history();
  for(var i=0;i<hist.length;i+=2){
    var row=document.createElement('div');row.className='mr';
    var n=document.createElement('span');n.className='mn';n.textContent=(Math.floor(i/2)+1)+'.';row.appendChild(n);
    var w=document.createElement('span');w.className='mc';w.textContent=hist[i]||'';row.appendChild(w);
    var b=document.createElement('span');b.className='mc';b.textContent=hist[i+1]||'';row.appendChild(b);
    if(i+1>=hist.length-1){ if(hist[i+1]) b.classList.add('cur'); else w.classList.add('cur'); }
    el.appendChild(row);
  }
  el.scrollTop=el.scrollHeight;
}
function renderCaptured(){
  var wc=capturedW.slice().sort(function(a,b){var pv={p:1,n:3,b:3,r:5,q:9};return(pv[b]||0)-(pv[a]||0);});
  var bc=capturedB.slice().sort(function(a,b){var pv={p:1,n:3,b:3,r:5,q:9};return(pv[b]||0)-(pv[a]||0);});
  var capW=document.getElementById('capW'), capB=document.getElementById('capB');
  if(capW) capW.innerHTML=wc.map(function(p){return getPieceSVG(p);}).join('');
  if(capB) capB.innerHTML=bc.map(function(p){return getPieceSVG(p.toUpperCase());}).join('');
}
function updateStatus(){
  if(gameOver)return;
  if(!started){setSt('Clique em INICIAR PARTIDA','y');return;}
  var isChk=chess.in_check();
  if(chess.turn()===playerColor){
    setSt('Sua vez - '+(playerColor==='w'?'Brancas':'Pretas')+(isChk?' - Xeque!':''),isChk?'y':'g');
  }else{
    setSt(thinking?'Calculando...':'Aguardando...',thinking?'r':'y');
  }
  var pnlW=document.getElementById('pnlW'), pnlB=document.getElementById('pnlB');
  if(pnlW) pnlW.classList.toggle('on',chess.turn()==='w');
  if(pnlB) pnlB.classList.toggle('on',chess.turn()==='b');
  var einfo=document.getElementById('einfo');
  if(einfo) einfo.style.display=(chess.turn()!==playerColor&&started)?'block':'none';
}
function setSt(t,c){if(stxt) stxt.textContent=t; if(sdot) sdot.className='sd '+c;}
function showThinking(){var e=document.getElementById('think'); if(e) e.classList.add('vis');}
function hideThinking(){var e=document.getElementById('think'); if(e) e.classList.remove('vis');}
function onSqMouseDown(sqStr,r,c,e){
  if(gameOver||thinking||!started)return;
  if(chess.turn()!==playerColor)return;
  var board=chess.board();
  var piece=board[r][c];
  if(selectedSquare){
    var targetMove=selectedMoves.find(function(m){return m.to===sqStr;});
    if(targetMove){
      if(targetMove.flags.indexOf('p')>=0 && targetMove.promotion){
        showPromotion(targetMove);
      }else{
        executePlayerMove(targetMove);
      }
      return;
    }
    if(piece&&piece.color===playerColor){
      startDrag(sqStr,r,c,e);
      selectedSquare=sqStr;
      selectedMoves=chess.moves({square:sqStr,verbose:true});
      render();
      return;
    }
    selectedSquare=null;selectedMoves=[];render();return;
  }
  if(piece&&piece.color===playerColor){
    startDrag(sqStr,r,c,e);
    selectedSquare=sqStr;
    selectedMoves=chess.moves({square:sqStr,verbose:true});
    render();
  }
}
function startDrag(sqStr,r,c,e){
  dragging=true;dragFrom=sqStr;
  var sqEl=boardEl.querySelector('.sq[data-r="'+r+'"][data-c="'+c+'"]');
  if(!sqEl)return;
  var pw=sqEl.querySelector('.pw'); if(!pw)return;
  var piece=chess.board()[r][c]; if(!piece)return;
  var pcChar=piece.type; if(piece.color==='w') pcChar=pcChar.toUpperCase();
  if(dragEl){dragEl.remove();dragEl=null;}
  dragEl=document.createElement('div');dragEl.className='drag-ghost';dragEl.innerHTML=getPieceSVG(pcChar);
  document.body.appendChild(dragEl);
  pw.style.opacity='0.25';
  var firstSq=boardEl.querySelector('.sq');
  if(firstSq){
    var rect=firstSq.getBoundingClientRect();
    dragEl.style.width=rect.width+'px';dragEl.style.height=rect.height+'px';
    if(e){dragEl.style.left=(e.clientX-rect.width/2)+'px';dragEl.style.top=(e.clientY-rect.height/2)+'px';}
  }
}
function moveDrag(e){
  if(!dragging||!dragEl)return;
  var firstSq=boardEl.querySelector('.sq'); if(!firstSq)return;
  var rect=firstSq.getBoundingClientRect();
  dragEl.style.left=(e.clientX-rect.width/2)+'px';
  dragEl.style.top=(e.clientY-rect.height/2)+'px';
  boardEl.querySelectorAll('.sq.drag-over').forEach(function(s){s.classList.remove('drag-over');});
  var el=document.elementFromPoint(e.clientX,e.clientY);
  if(el){var sq=el.closest('.sq'); if(sq&&sq.dataset.r!==undefined) sq.classList.add('drag-over');}
}
function endDrag(e){
  if(!dragging)return;
  var moved=false;
  dragging=false;
  boardEl.querySelectorAll('.sq.drag-over').forEach(function(s){s.classList.remove('drag-over');});
  if(dragEl){
    var ex=e.clientX||0,ey=e.clientY||0;
    var el=document.elementFromPoint(ex,ey);
    if(el){
      var sq=el.closest('.sq');
      if(sq&&sq.dataset.r!==undefined){
        var tr=parseInt(sq.dataset.r),tc=parseInt(sq.dataset.c);
        var toSq=sqName(tr,tc);
        if(toSq!==dragFrom){
          var move=selectedMoves.find(function(m){return m.to===toSq;});
          if(move){moved=true; if(move.flags.indexOf('p')>=0 && move.promotion){showPromotion(move);} else{executePlayerMove(move);} }
        }
      }
    }
    dragEl.remove();dragEl=null;
  }
  if(!moved){
    if(dragFrom){selectedSquare=dragFrom;selectedMoves=chess.moves({square:dragFrom,verbose:true});render();}
  }
  dragFrom=null;
}
document.addEventListener('mousemove',function(e){if(dragging)moveDrag(e);});
document.addEventListener('mouseup',function(e){if(dragging)endDrag(e);});
document.addEventListener('touchmove',function(e){if(dragging){e.preventDefault();moveDrag(e.touches[0]);}},{passive:false});
document.addEventListener('touchend',function(e){if(dragging){var t=e.changedTouches[0];endDrag(t);}});
window.addEventListener('blur',function(){if(dragging){dragging=false;if(dragEl){dragEl.remove();dragEl=null;}boardEl.querySelectorAll('.sq.drag-over').forEach(function(s){s.classList.remove('drag-over');});render();}});
function executePlayerMove(move){
  var result=chess.move(move);
  if(!result)return;
  lastMove={from:result.from,to:result.to};
  rebuildCaptured();
  selectedSquare=null;selectedMoves=[];dragFrom=null;
  if(dragEl){dragEl.remove();dragEl=null;}
  render();
  if(!checkGameOver()){requestEngineMove();}
}
function showPromotion(move){
  dragging=false;if(dragEl){dragEl.remove();dragEl=null;}
  var md=document.getElementById('promoM'),op=document.getElementById('promoO');
  if(!md||!op)return;
  op.innerHTML='';
  var pieces=['q','r','b','n'];
  var names={q:'Dama',r:'Torre',b:'Bispo',n:'Cavalo'};
  pieces.forEach(function(p){
    var btn=document.createElement('button');btn.className='pbtn';
    var pcChar=playerColor==='w'?p.toUpperCase():p;
    btn.innerHTML='<div style="width:56px;height:72px">'+getPieceSVG(pcChar)+'</div>';
    btn.title=names[p];
    btn.onclick=function(){md.classList.remove('vis');executePlayerMove({from:move.from,to:move.to,promotion:p});};
    op.appendChild(btn);
  });
  md.classList.add('vis');
}
function checkGameOver(){
  if(chess.in_checkmate()){
    gameOver=true;stopClock();
    var winner=chess.turn()==='w'?'Pretas':'Brancas';
    var pw=chess.turn()!==playerColor;
    showGO(pw?'Vitoria!':'Derrota',winner+' venceram por cheque-mate!',pw?'\u2614':'\u2639');return true;
  }
  if(chess.in_stalemate()){gameOver=true;stopClock();showGO('Empate','Afogamento','\u2614');return true;}
  if(chess.in_draw()){gameOver=true;stopClock();showGO('Empate','Material insuficiente ou 50 lances','\u2614');return true;}
  if(chess.in_threefold_repetition()){gameOver=true;stopClock();showGO('Empate','Repeticao tripla','\u2614');return true;}
  return false;
}
function showGO(t,d,i){
  var gi=document.getElementById('goI'), gt=document.getElementById('goT'), gd=document.getElementById('goD'), gm=document.getElementById('goM');
  if(gi) gi.textContent=i; if(gt) gt.textContent=t; if(gd) gd.textContent=d; if(gm) gm.classList.add('vis');
}
function startPlayerClock(){
  if(tMinutes<=0||gameOver)return;
  stopClock();
  timerI=setInterval(function(){
    if(gameOver||!started)return;
    if(chess.turn()==='w'){
      wTime--; if(wTime<=0){wTime=0;gameOver=true;stopClock();showGO('Tempo Esgotado','Brancas perderam','\u23F0');}
    }else{
      bTime--; if(bTime<=0){bTime=0;gameOver=true;stopClock();showGO('Tempo Esgotado','Pretas perderam','\u23F0');}
    }
    updateClocks();
  },1000);
}
function stopClock(){if(timerI){clearInterval(timerI);timerI=null;}}
function updateClocks(){
  function fmt(t){if(t<0)t=0;var m=Math.floor(t/60),s=t%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
  var wt=document.getElementById('tmrW'),bt=document.getElementById('tmrB');
  if(wt) wt.textContent=fmt(wTime); if(bt) bt.textContent=fmt(bTime);
  if(wt) wt.classList.toggle('lt',wTime<=30&&tMinutes>0&&chess.turn()==='w');
  if(bt) bt.classList.toggle('lt',bTime<=30&&tMinutes>0&&chess.turn()==='b');
}
function newGame(){
  var goM=document.getElementById('goM'), promoM=document.getElementById('promoM');
  if(goM) goM.classList.remove('vis'); if(promoM) promoM.classList.remove('vis');
  if(dragEl){dragEl.remove();dragEl=null;} dragging=false;dragFrom=null;
  if(!chess) safeInitChess();
  chess.reset();
  flipped=playerColor==='b';
  gameOver=false;thinking=false;started=false;
  selectedSquare=null;selectedMoves=[];lastMove=null;
  capturedW=[];capturedB=[];
  wTime=tMinutes*60;bTime=tMinutes*60;
  sfEval=0;sfDepth=0;sfNodes=0;sfTime=0;
  stopClock();hideThinking();render();
  var btnStart=document.getElementById('btnStart'); if(btnStart) btnStart.style.display='';
  var einfo=document.getElementById('einfo'); if(einfo) einfo.style.display='none';
  var pnlW=document.getElementById('pnlW'), pnlB=document.getElementById('pnlB');
  if(pnlW) pnlW.classList.remove('on'); if(pnlB) pnlB.classList.remove('on');
  if(stockfishReady && stockfish){try{stockfish.postMessage('stop');}catch(e){}}
}
function startMatch(){
  if(started||gameOver)return;
  started=true;
  var btnStart=document.getElementById('btnStart'); if(btnStart) btnStart.style.display='none';
  render();startPlayerClock();
  if(playerColor==='b')requestEngineMove();
}
function undo(){
  if(thinking||gameOver||!started)return;
  var histLen=chess.history().length; if(histLen===0)return;
  if(histLen>=2){chess.undo();chess.undo();}else{chess.undo();}
  rebuildCaptured();
  var hist=chess.history({verbose:true});
  lastMove=hist.length>0?{from:hist[hist.length-1].from,to:hist[hist.length-1].to}:null;
  selectedSquare=null;selectedMoves=[];render();
  if(tMinutes>0) startPlayerClock();
}
function flip(){flipped=!flipped;render();}
function resign(){
  if(gameOver||!started)return;
  gameOver=true;stopClock();
  var w=playerColor==='w'?'Pretas':'Brancas';
  showGO(playerColor==='w'?'Derrota':'Vitoria',w+' venceram por rendicao',playerColor==='w'?'\u2639':'\u2614');
}
function toggleCfg(){var el=document.getElementById('cfgP'); if(el) el.classList.toggle('open');}
function onDiff(){
  var sel=document.getElementById('selDiff'); if(!sel) return;
  var v=parseInt(sel.value);
  var depths=[8,12,16,20];engineDepth=depths[v-1]||12;
  var ls={1:'FACIL',2:'MEDIO',3:'DIFICIL',4:'EXPERT'};
  var cs={1:'e',2:'m',3:'h',4:'x'};
  var badge=document.getElementById('badge');
  if(badge){badge.textContent=ls[v];badge.className='db '+cs[v];}
  if(stockfishReady&&stockfish){try{stockfish.postMessage('setoption name Skill Level value '+getSkillLevel());}catch(e){}}
}
function onTmr(){var sel=document.getElementById('selTmr'); if(!sel) return; tMinutes=parseInt(sel.value);newGame();}
function onClr(){
  var sel=document.getElementById('selClr'); if(!sel) return;
  playerColor=sel.value;
  var pnW=document.querySelector('#pnlW .pn'), pnB=document.querySelector('#pnlB .pn');
  if(pnW) pnW.textContent=playerColor==='w'?'Voce (Brancas)':'Stockfish (Brancas)';
  if(pnB) pnB.textContent=playerColor==='b'?'Voce (Pretas)':'Stockfish (Pretas)';
  newGame();
}
document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='Escape'){
    var goM=document.getElementById('goM'), promoM=document.getElementById('promoM');
    if(goM) goM.classList.remove('vis'); if(promoM) promoM.classList.remove('vis');
  }
});
var promoMEl=document.getElementById('promoM');
if(promoMEl) promoMEl.addEventListener('click',function(e){if(e.target===this)this.classList.remove('vis');});

if(safeInitChess()){
  initStockfish();
  newGame();
  console.log('Xadrez Pro inicializado - fallback:',useFallback);
}
})();
</script>
</body>
