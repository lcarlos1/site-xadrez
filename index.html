<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xadrez Pro • Moderno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1115;--sf:#1a1e26;--sf2:#21262f;--sf3:#2d3440;--ac:#6ea8fe;--ac2:#3d7eff;--gn:#3dd68c;--rd:#f85149;--yw:#d29922;--lt:#f0ebd8;--dk:#7aa05a;--tx:#e6edf3;--t2:#8b949e;--r:16px;--sh:0 16px 48px rgba(0,0,0,.7)}
html,body{height:100%;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;background:radial-gradient(1200px 800px at 50% -10%,#1e2635 0%,#0f1115 60%)}

.app{display:grid;grid-template-columns:260px 1fr 260px;grid-template-rows:auto 1fr auto;gap:0;height:100vh;max-width:1320px;width:100%;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;box-shadow:var(--sh)}

.hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:rgba(26,30,38,.9);border-bottom:1px solid var(--sf3);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:800;letter-spacing:-.4px}
.logo-i{width:36px;height:36px;background:linear-gradient(135deg,#6ea8fe,#a48fff);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 18px rgba(110,168,254,.35)}
.hdr-c{display:flex;align-items:center;gap:10px}

.sb{background:rgba(18,21,28,.9);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.sb-l{border-right:1px solid rgba(255,255,255,.06)}
.sb-r{border-left:1px solid rgba(255,255,255,.06)}

.pp{border-radius:14px;padding:16px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.06);transition:all .25s}
.pp.on{border-color:rgba(110,168,254,.5);box-shadow:0 0 24px rgba(110,168,254,.12),inset 0 1px 0 rgba(255,255,255,.06)}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ind{width:9px;height:9px;border-radius:50%;background:var(--sf3);transition:.25s}
.pp.on .ind{background:var(--gn);box-shadow:0 0 8px var(--gn)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.pn{font-size:13px;font-weight:600;flex:1}
.pt{font-family:'JetBrains Mono','SF Mono',monospace;font-size:28px;font-weight:800;letter-spacing:1px}
.pt.lt{color:var(--rd);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}

.ei{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.el{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);line-height:1.7}
.el .v{color:var(--tx);font-weight:600;font-family:'JetBrains Mono',monospace}

.hp{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.hp h4{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:8px}
.mh{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-height:0}
.mh::-webkit-scrollbar{width:4px}
.mh::-webkit-scrollbar-track{background:transparent}
.mh::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}
.mr{display:grid;grid-template-columns:28px 1fr 1fr;gap:2px;font-size:12px;font-family:'JetBrains Mono',monospace}
.mn{color:var(--sf3);text-align:right;padding-right:6px;line-height:24px}
.mc{padding:2px 6px;border-radius:6px;line-height:24px}

.pc{display:flex;flex-wrap:wrap;gap:4px;min-height:28px;align-items:center}
.pc .piece{width:28px;height:28px}

.sp{padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border-radius:14px;border:1px solid rgba(255,255,255,.06);display:none}
.sp.open{display:block}
.sr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px}
.sr label{color:var(--t2);font-weight:500}
.sr select{background:var(--sf3);border:1px solid rgba(255,255,255,.08);color:var(--tx);border-radius:8px;padding:5px 8px;font-size:12px;font-family:inherit;min-width:100px;cursor:pointer;outline:none}

.ct{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px}
.ba{position:relative}
.fl{display:flex;padding:4px 0 0}
.fl span{width:calc(min(760px,calc(100vh - 140px))/8);text-align:center;font-size:11px;font-weight:800;color:#9ab07a;letter-spacing:.3px}
.rl{position:absolute;left:-20px;top:0;bottom:0;display:flex;flex-direction:column}
.rl span{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#9ab07a;width:16px}
.bd{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(760px,calc(100vh - 140px));aspect-ratio:1;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.1);user-select:none;position:relative}

.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:filter .12s,transform .08s}
.sq:active{transform:scale(.97)}
.sq.l{background:linear-gradient(180deg,#f3f0d8 0%,#e9e4c8 100%)}
.sq.d{background:linear-gradient(180deg,#8ab56a 0%,#739552 100%)}
.sq.sel{background:linear-gradient(180deg,#a3d977 0%,#7fb950 100%)!important;box-shadow:inset 0 0 0 3px #3a6b1e}
.sq.lf,.sq.lt{background:linear-gradient(180deg,#ffe97a 0%,#f5d547 100%)!important}
.sq.chk{background:radial-gradient(60% 60% at 50% 50%,#ff6b6b 0%,#d33 100%)!important;animation:chk 1s infinite}
@keyframes chk{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

.sq .dot{position:absolute;width:26%;height:26%;border-radius:50%;background:rgba(20,30,15,.32);box-shadow:0 1px 2px rgba(0,0,0,.3),inset 0 1px 1px rgba(255,255,255,.2);z-index:1}
.sq .ring{position:absolute;width:88%;height:88%;border-radius:50%;border:6px solid rgba(20,30,15,.35);z-index:1;box-shadow:inset 0 1px 2px rgba(0,0,0,.2)}

.piece{position:relative;z-index:2;width:92%;height:92%;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:transform .15s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 3px 5px rgba(0,0,0,.5)) drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.sq:hover .piece{transform:scale(1.08) translateY(-3px)}
.sq.sel .piece{transform:scale(1.1)}
.piece svg{width:100%;height:100%;overflow:visible}
.piece.white svg{filter:drop-shadow(0 1px 0 rgba(0,0,0,.15))}
.piece.black svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}

.cd{position:absolute;font-size:10px;font-weight:800;z-index:3;pointer-events:none;font-family:Inter,sans-serif;letter-spacing:.2px}
.cf{bottom:3px;right:4px}.cr{top:3px;left:4px}
.sq.l .cd{color:rgba(90,122,58,.7)}.sq.d .cd{color:rgba(232,227,198,.7)}

.to{position:absolute;inset:0;background:rgba(10,12,16,.45);display:none;align-items:center;justify-content:center;border-radius:14px;z-index:20;backdrop-filter:blur(8px)}
.to.vis{display:flex}
.tt{background:#1e242f;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 12px 32px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1)}
.td{display:flex;gap:5px}.td span{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:bnc .6s infinite}
.td span:nth-child(2){animation-delay:.15s}.td span:nth-child(3){animation-delay:.3s}
@keyframes bnc{50%{transform:translateY(-5px)}}

.st{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(255,255,255,.04);border-radius:12px;font-size:13px;min-height:40px;border:1px solid rgba(255,255,255,.06)}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd.g{background:var(--gn);box-shadow:0 0 6px var(--gn)}
.sd.r{background:var(--rd);box-shadow:0 0 6px var(--rd)}
.sd.y{background:var(--yw);box-shadow:0 0 6px var(--yw)}
.stx{flex:1;font-weight:500}

.bt{padding:7px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.06);color:var(--tx);font-size:11px;font-weight:700;cursor:pointer;transition:.18s;text-transform:uppercase;letter-spacing:.6px;font-family:inherit}
.bt:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}.bt:active{transform:scale(.97)}
.bt.pr{background:linear-gradient(135deg,#3d7eff,#8b5cf6);border-color:transparent;color:#fff;box-shadow:0 6px 20px rgba(61,126,255,.35)}
.bt.pr:hover{opacity:.9}
.bt.dg{border-color:rgba(248,81,73,.4);color:var(--rd)}.bt.dg:hover{background:rgba(248,81,73,.1)}

.bg{display:flex;gap:8px;flex-wrap:wrap}

.db{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.db.e{background:rgba(61,214,140,.15);color:var(--gn);border:1px solid rgba(61,214,140,.2)}
.db.m{background:rgba(110,168,254,.15);color:var(--ac);border:1px solid rgba(110,168,254,.2)}
.db.h{background:rgba(210,153,34,.15);color:var(--yw);border:1px solid rgba(210,153,34,.2)}
.db.x{background:rgba(248,81,73,.15);color:var(--rd);border:1px solid rgba(248,81,73,.2)}

.mo,.pm{position:fixed;inset:0;background:rgba(6,8,12,.78);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(12px)}
.mo.vis,.pm.vis{display:flex}
.mdl,.pbx{background:linear-gradient(180deg,#242c3a 0%,#1a1f2b 100%);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:32px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08)}
.mdl h2{font-size:24px;margin-bottom:8px}
.mdl p{color:var(--t2);margin-bottom:20px;font-size:14px}
.mdl .ri{font-size:48px;margin-bottom:12px}
.pbx h3{margin-bottom:16px;font-size:16px}
.pos{display:flex;gap:12px;justify-content:center}
.pbtn{width:84px;height:84px;border:2px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.05);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.pbtn:hover{transform:scale(1.08) translateY(-2px);border-color:var(--ac);box-shadow:0 8px 24px rgba(110,168,254,.25)}
.pbtn .piece{width:68px;height:68px}

.ftr{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:10px 22px;background:rgba(26,30,38,.9);border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:var(--t2);letter-spacing:.3px}

@media(max-width:1100px){
  .app{grid-template-columns:1fr;grid-template-rows:auto auto auto auto;height:auto;min-height:100vh;border-radius:0}
  .sb{flex-direction:row;flex-wrap:wrap;padding:10px}
  .sb-l,.sb-r{border:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .bd{width:min(94vw,600px)}
  .fl span{width:calc(min(94vw,600px)/8)}
  .rl span{width:14px}
}
</style>

</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo"><div class="logo-i">♞</div>Xadrez Pro</div>
    <div class="hdr-c">
      <span class="db m" id="badge">MEDIO</span>
      <div class="bg">
        <button class="bt" onclick="toggleCfg()">Config</button>
        <button class="bt pr" id="btnStart" onclick="startMatch()">INICIAR PARTIDA</button>
      </div>
    </div>
  </div>
  <div class="sb sb-l">
    <div class="pp" id="pnlB">
      <div class="ph"><div class="ind"></div><div class="av" style="background:#2a7fff">◈</div><span class="pn">Máquina (Pretas)</span></div>
      <div class="pt" id="tmrB">10:00</div>
      <div class="pc" id="capB"></div>
      <div class="ei" id="einfo" style="display:none">
        <div class="el"><span>Avaliação</span><span class="v" id="evSc">0.00</span></div>
        <div class="el"><span>Profundidade</span><span class="v" id="evDp">0</span></div>
        <div class="el"><span>Nós/s</span><span class="v" id="evNs">0</span></div>
      </div>
    </div>
    <div class="hp"><h4>Histórico</h4><div class="mh" id="mhist"></div></div>
  </div>
  <div class="ct">
    <div class="ba">
      <div class="rl" id="rlbl"></div>
      <div class="fl" id="flbl"></div>
      <div class="bd" id="board"><div class="to" id="think"><div class="tt"><div class="td"><span></span><span></span><span></span></div>IA pensando...</div></div></div>
    </div>
    <div class="st" id="stbar"><div class="sd g" id="sdot"></div><span class="stx" id="stxt">Pronto para jogar</span></div>
    <div class="bg">
      <button class="bt" onclick="undo()">↩ Desfazer</button>
      <button class="bt" onclick="flip()">⤢ Inverter</button>
      <button class="bt dg" onclick="resign()">🏳 Render-se</button>
    </div>
  </div>
  <div class="sb sb-r">
    <div class="pp" id="pnlW">
      <div class="ph"><div class="ind"></div><div class="av" style="background:#3dd68c">●</div><span class="pn">Você (Brancas)</span></div>
      <div class="pt" id="tmrW">10:00</div>
      <div class="pc" id="capW"></div>
    </div>
    <div class="sp" id="cfgP">
      <div class="sr"><label>Dificuldade</label><select id="selDiff" onchange="onDiff()"><option value="1">Fácil</option><option value="2" selected>Médio</option><option value="3">Difícil</option><option value="4">Expert</option></select></div>
      <div class="sr"><label>Tempo (min)</label><select id="selTmr" onchange="onTmr()"><option value="0">Sem tempo</option><option value="3">3 min</option><option value="5">5 min</option><option value="10" selected>10 min</option><option value="15">15 min</option></select></div>
      <div class="sr"><label>Sua cor</label><select id="selClr" onchange="onClr()"><option value="w" selected>Brancas</option><option value="b">Pretas</option></select></div>
    </div>
  </div>
  <div class="ftr">&copy; 2026 Luiz Carlos dos Santos. Todos os direitos reservados.</div>
</div>
<div class="pm" id="promoM"><div class="pbx"><h3>Promover Peão</h3><div class="pos" id="promoO"></div></div></div>
<div class="mo" id="goM"><div class="mdl"><div class="ri" id="goI">🏆</div><h2 id="goT">Fim de Jogo</h2><p id="goD"></p><div class="bg" style="justify-content:center"><button class="bt pr" onclick="newGame()">Novo Jogo</button></div></div></div>
<script>

var FILES='abcdefgh';

var SVG_PIECES = {
  'K': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round" stroke-linecap="round"><path d="M46 10 L50 6 L54 10 L54 18 L46 18Z" fill="URL(#wk)" stroke="currentColor" stroke-width="2.5"/><path d="M38 14 L62 14" stroke="currentColor" stroke-width="3.5"/><path d="M26 26 C26 18 50 12 74 26 L76 34 L24 34Z" fill="URL(#wk)" stroke="currentColor" stroke-width="2.8"/><path d="M30 36 L70 36 L68 58 L32 58Z" fill="URL(#wk)" stroke="currentColor" stroke-width="2.8"/><path d="M24 64 L76 64 L78 72 L22 72Z" fill="URL(#wk)" stroke="currentColor" stroke-width="2.8"/><path d="M18 78 L82 78 L84 88 L16 88Z" fill="URL(#wk)" stroke="currentColor" stroke-width="2.8"/></g></svg>`,
  'Q': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round"><circle cx="18" cy="22" r="4.5" fill="URL(#wq)" stroke="currentColor" stroke-width="2.2"/><circle cx="34" cy="12" r="4.5" fill="URL(#wq)" stroke="currentColor" stroke-width="2.2"/><circle cx="50" cy="8" r="5" fill="URL(#wq)" stroke="currentColor" stroke-width="2.2"/><circle cx="66" cy="12" r="4.5" fill="URL(#wq)" stroke="currentColor" stroke-width="2.2"/><circle cx="82" cy="22" r="4.5" fill="URL(#wq)" stroke="currentColor" stroke-width="2.2"/><path d="M14 28 C14 16 50 8 86 28 L82 42 L18 42Z" fill="URL(#wq)" stroke="currentColor" stroke-width="2.8"/><path d="M30 44 L70 44 L68 60 L32 60Z" fill="URL(#wq)" stroke="currentColor" stroke-width="2.8"/><path d="M24 66 L76 66 L78 74 L22 74Z" fill="URL(#wq)" stroke="currentColor" stroke-width="2.8"/><path d="M18 78 L82 78 L84 88 L16 88Z" fill="URL(#wq)" stroke="currentColor" stroke-width="2.8"/></g></svg>`,
  'R': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round"><path d="M20 16 L20 30 L28 30 L28 20 L38 20 L38 30 L48 30 L48 16 L52 16 L52 30 L62 30 L62 20 L72 20 L72 30 L80 30 L80 16Z" fill="URL(#wr)" stroke="currentColor" stroke-width="2.8"/><path d="M24 32 L76 32 L74 42 L26 42Z" fill="URL(#wr)" stroke="currentColor" stroke-width="2.8"/><path d="M30 44 L70 44 L68 62 L32 62Z" fill="URL(#wr)" stroke="currentColor" stroke-width="2.8"/><path d="M24 66 L76 66 L78 74 L22 74Z" fill="URL(#wr)" stroke="currentColor" stroke-width="2.8"/><path d="M18 78 L82 78 L84 88 L16 88Z" fill="URL(#wr)" stroke="currentColor" stroke-width="2.8"/></g></svg>`,
  'B': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round"><circle cx="50" cy="12" r="5" fill="URL(#wb)" stroke="currentColor" stroke-width="2.2"/><path d="M50 17 L34 38 L34 44 L66 44 L66 38Z" fill="URL(#wb)" stroke="currentColor" stroke-width="2.8"/><path d="M42 34 L58 34" stroke="currentColor" stroke-width="2.5" opacity=".5"/><path d="M36 46 L64 46 L68 64 L32 64Z" fill="URL(#wb)" stroke="currentColor" stroke-width="2.8"/><path d="M28 68 L72 68 L74 76 L26 76Z" fill="URL(#wb)" stroke="currentColor" stroke-width="2.8"/><path d="M20 80 L80 80 L82 90 L18 90Z" fill="URL(#wb)" stroke="currentColor" stroke-width="2.8"/></g></svg>`,
  'N': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round" stroke-linecap="round"><path d="M30 74 Q24 56 32 40 Q38 28 52 24 Q66 22 72 32 Q78 42 70 50 L64 44 Q68 36 62 30 Q54 26 44 34 Q38 40 36 50 L44 56 L46 64 L54 60 L60 68 L64 80 L30 80Z" fill="URL(#wn)" stroke="currentColor" stroke-width="2.8"/><circle cx="58" cy="36" r="3.5" fill="currentColor"/><path d="M40 50 L54 46" stroke="currentColor" stroke-width="2.5" opacity=".6"/><path d="M26 82 L74 82 L76 90 L24 90Z" fill="URL(#wn)" stroke="currentColor" stroke-width="2.8"/></g></svg>`,
  'P': `<svg viewBox="0 0 100 100"><defs><linearGradient id="wp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="FFF"/><stop offset="100%" stop-color="DDD"/></linearGradient></defs><g stroke-linejoin="round"><circle cx="50" cy="22" r="12" fill="URL(#wp)" stroke="currentColor" stroke-width="2.8"/><path d="M50 34 C38 42 30 54 30 64 L70 64 C70 54 62 42 50 34Z" fill="URL(#wp)" stroke="currentColor" stroke-width="2.8"/><path d="M32 68 L68 68 L72 76 L28 76Z" fill="URL(#wp)" stroke="currentColor" stroke-width="2.8"/><path d="M24 80 L76 80 L78 90 L22 90Z" fill="URL(#wp)" stroke="currentColor" stroke-width="2.8"/></g></svg>`
};

function getPieceHTML(pc){
  var isW = pc === pc.toUpperCase();
  var type = pc.toUpperCase();
  var svg = SVG_PIECES[type] || '';
  if(isW){
    var cls='piece white';
    var colored=svg.replace(/currentColor/g,'#1a1a2e');
    return '<div class="'+cls+'">'+colored+'</div>';
  }else{
    var cls='piece black';
    var colored=svg.replace(/currentColor/g,'#e8e0d0');
    colored=colored.replace(/id="w[kqrbnp]"/g,function(m){return m.replace('w','b');});
    colored=colored.replace(/URL\(#w([kqrbnp])\)/g,function(m,p){return 'URL(#b'+p+')';});
    colored=colored.replace(/stop-color="FFF"/g,'stop-color="#3a3a4a"');
    colored=colored.replace(/stop-color="DDD"/g,'stop-color="#111118"');
    return '<div class="'+cls+'">'+colored+'</div>';
  }
}

var PVAL={P:100,N:320,B:330,R:500,Q:900,K:20000};
var PHASE={P:0,N:1,B:1,R:2,Q:4,K:0};

function pFEN(f){var p=f.split(' '),rows=p[0].split('/'),b=[];for(var i=0;i<8;i++){var r=[],row=rows[i];for(var j=0;j<row.length;j++){var ch=row[j];if(ch>='1'&&ch<='8')for(var k=0;k<+ch;k++)r.push(null);else r.push(ch);}b.push(r);}return{board:b,turn:p[1]||'w',castling:p[2]||'-',ep:p[3]==='-'?null:p[3],halfmove:+(p[4]||0),fullmove:+(p[5]||1)};}

function isW(p){return p&&p===p.toUpperCase();}
function cOf(p){return p?(isW(p)?'w':'b'):null;}
function inB(r,c){return r>=0&&r<8&&c>=0&&c<8;}

function pMoves(bd,clr,ep){
  var moves=[],dir=clr==='w'?-1:1,sr=clr==='w'?6:1,pr=clr==='w'?0:7;
  for(var r=0;r<8;r++)for(var c=0;c<8;c++){
    var p=bd[r][c];if(!p||cOf(p)!==clr)continue;var t=p.toUpperCase();
    if(t==='P'){
      if(inB(r+dir,c)&&!bd[r+dir][c]){
        if(r+dir===pr)['Q','R','B','N'].forEach(function(q){moves.push({fr:r,fc:c,tr:r+dir,tc:c,promo:clr==='w'?q:q.toLowerCase()});});
        else{moves.push({fr:r,fc:c,tr:r+dir,tc:c});if(r===sr&&!bd[r+2*dir][c])moves.push({fr:r,fc:c,tr:r+2*dir,tc:c});}
      }
      for(var di=-1;di<=1;di+=2){var nc=c+di,nr=r+dir;if(!inB(nr,nc))continue;var tg=bd[nr][nc];
        if(tg&&cOf(tg)!==clr){if(nr===pr)['Q','R','B','N'].forEach(function(q){moves.push({fr:r,fc:c,tr:nr,tc:nc,promo:clr==='w'?q:q.toLowerCase()});});else moves.push({fr:r,fc:c,tr:nr,tc:nc});}
        if(ep&&FILES[nc]===ep[0]&&nr===+(ep[1])-1)moves.push({fr:r,fc:c,tr:nr,tc:nc,ep:true});
      }
    }else if(t==='N'){
      var nd=[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
      for(var i=0;i<8;i++){var nr=r+nd[i][0],nc=c+nd[i][1];if(inB(nr,nc)&&cOf(bd[nr][nc])!==clr)moves.push({fr:r,fc:c,tr:nr,tc:nc});}
    }else if(t==='K'){
      for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;var nr=r+dr,nc=c+dc;
        if(inB(nr,nc)&&cOf(bd[nr][nc])!==clr)moves.push({fr:r,fc:c,tr:nr,tc:nc});
      }
      var op=clr==='w'?'b':'w';
      if(clr==='w'){
        if(castling.indexOf('K')>=0&&!bd[7][5]&&!bd[7][6]&&bd[7][7]==='R'&&!isAtt(bd,7,5,op)&&!isAtt(bd,7,6,op)&&!isAtt(bd,7,4,op))moves.push({fr:7,fc:4,tr:7,tc:6,cas:'K'});
        if(castling.indexOf('Q')>=0&&!bd[7][3]&&!bd[7][2]&&!bd[7][1]&&bd[7][0]==='R'&&!isAtt(bd,7,3,op)&&!isAtt(bd,7,2,op)&&!isAtt(bd,7,4,op))moves.push({fr:7,fc:4,tr:7,tc:2,cas:'Q'});
      }else{
        if(castling.indexOf('k')>=0&&!bd[0][5]&&!bd[0][6]&&bd[0][7]==='r'&&!isAtt(bd,0,5,op)&&!isAtt(bd,0,6,op)&&!isAtt(bd,0,4,op))moves.push({fr:0,fc:4,tr:0,tc:6,cas:'k'});
        if(castling.indexOf('q')>=0&&!bd[0][3]&&!bd[0][2]&&!bd[0][1]&&bd[0][0]==='r'&&!isAtt(bd,0,3,op)&&!isAtt(bd,0,2,op)&&!isAtt(bd,0,4,op))moves.push({fr:0,fc:4,tr:0,tc:2,cas:'q'});
      }
    }else{
      var dirs=[];if(t==='B'||t==='Q')dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);if(t==='R'||t==='Q')dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for(var di=0;di<dirs.length;di++){var nr=r+dirs[di][0],nc=c+dirs[di][1];while(inB(nr,nc)){var tg=bd[nr][nc];if(tg){if(cOf(tg)!==clr)moves.push({fr:r,fc:c,tr:nr,tc:nc});break;}moves.push({fr:r,fc:c,tr:nr,tc:nc});nr+=dirs[di][0];nc+=dirs[di][1];}}
    }
  }
  return moves;
}

function isAtt(bd,r,c,bc){
  var pd=bc==='w'?-1:1;
  for(var di=-1;di<=1;di+=2){var pr=r+pd,pc=c+di;if(inB(pr,pc)){var pp=bd[pr][pc];if(pp&&cOf(pp)===bc&&pp.toUpperCase()==='P')return true;}}
  var nd=[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
  for(var i=0;i<8;i++){var nr=r+nd[i][0],nc=c+nd[i][1];if(inB(nr,nc)){var pp=bd[nr][nc];if(pp&&cOf(pp)===bc&&pp.toUpperCase()==='N')return true;}}
  for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;var nr=r+dr,nc=c+dc;if(inB(nr,nc)){var pp=bd[nr][nc];if(pp&&cOf(pp)===bc&&pp.toUpperCase()==='K')return true;}}
  var slds=[{d:[[-1,-1],[-1,1],[1,-1],[1,1]],t:['B','Q']},{d:[[-1,0],[1,0],[0,-1],[0,1]],t:['R','Q']}];
  for(var si=0;si<slds.length;si++){var sd=slds[si].d,st=slds[si].t;for(var di=0;di<sd.length;di++){var nr=r+sd[di][0],nc=c+sd[di][1];while(inB(nr,nc)){var pp=bd[nr][nc];if(pp){if(cOf(pp)===bc&&st.indexOf(pp.toUpperCase())>=0)return true;break;}nr+=sd[di][0];nc+=sd[di][1];}}}
  return false;
}

function findK(bd,clr){var k=clr==='w'?'K':'k';for(var r=0;r<8;r++)for(var c=0;c<8;c++)if(bd[r][c]===k)return[r,c];return null;}
function inChk(bd,clr){var kp=findK(bd,clr);if(!kp)return false;return isAtt(bd,kp[0],kp[1],clr==='w'?'b':'w');}

function applyMv(bd,m){
  var nb=[];for(var i=0;i<8;i++){nb[i]=[];for(var j=0;j<8;j++)nb[i][j]=bd[i][j];}
  if(m.cas){var row=m.fr;nb[m.fr][m.fc]=null;nb[m.tr][m.tc]=bd[m.fr][m.fc];
    if(m.tc===6){nb[m.fr][5]=nb[m.fr][7];nb[m.fr][7]=null;}
    else if(m.tc===2){nb[m.fr][3]=nb[m.fr][0];nb[m.fr][0]=null;}
    return nb;
  }
  if(m.ep){nb[m.tr][m.tc]=bd[m.fr][m.fc];nb[m.fr][m.fc]=null;nb[m.fr][m.tc]=null;}
  else{nb[m.tr][m.tc]=m.promo||bd[m.fr][m.fc];nb[m.fr][m.fc]=null;}
  return nb;
}

function legMoves(bd,clr,ep){
  var ps=pMoves(bd,clr,ep),lg=[];
  for(var i=0;i<ps.length;i++){var nb=applyMv(bd,ps[i]);if(!inChk(nb,clr))lg.push(ps[i]);}
  return lg;
}

function evaluate(bd,clr){
  var mg=0,eg=0,ph=0;
  for(var r=0;r<8;r++)for(var c=0;c<8;c++){
    var p=bd[r][c];if(!p)continue;var w=p===p.toUpperCase(),v=PVAL[p.toUpperCase()];
    ph+=PHASE[p.toUpperCase()];var idx=w?r*8+c:(7-r)*8+c;
    if(w){mg+=v+PST_MG[p.toUpperCase()][idx];eg+=v+PST_EG[p.toUpperCase()][idx];}
    else{mg-=v+PST_MG[p.toUpperCase()][idx];eg-=v+PST_EG[p.toUpperCase()][idx];}
  }
  if(ph>24)ph=24;var s=Math.floor(mg*(ph/24)+eg*(1-ph/24));
  return clr==='w'?s:-s;
}

var killers=[],histT=[];
function initK(){killers=[];histT=[];for(var i=0;i<64;i++){killers.push([null,null]);histT.push([]);for(var j=0;j<64;j++)histT[i].push(0);}}

function scoreMv(m,bd){
  var s=0,cap=bd[m.tr][m.tc];
  if(m.promo)s+=PVAL[m.promo.toUpperCase()];
  if(cap)s+=10*PVAL[cap.toUpperCase()]-PVAL[bd[m.fr][m.fc].toUpperCase()];
  var ki=m.fr*8+m.fc;
  if(killers[0][ki]&&killers[0][ki].tr===m.tr&&killers[0][ki].tc===m.tc)s+=8;
  else if(killers[1][ki]&&killers[1][ki].tr===m.tr&&killers[1][ki].tc===m.tc)s+=7;
  s+=histT[ki][m.tr*8+m.tc]||0;
  return s;
}

function orderMv(arr,bd){arr.sort(function(a,b){return scoreMv(b,bd)-scoreMv(a,bd);});}

function quies(bd,clr,ep,a,b,dep){
  eNodes++;if(eNodes%512===0&&(Date.now()-eStart)>eLimit)return 0;
  var sp=evaluate(bd,clr);
  if(sp>=b)return b;if(dep<=0)return sp>a?sp:a;
  var mvs=pMoves(bd,clr,ep),caps=[];
  for(var i=0;i<mvs.length;i++){var m=mvs[i];if(bd[m.tr][m.tc]||m.ep||m.promo)caps.push(m);}
  orderMv(caps,bd);
  for(var i=0;i<caps.length&&i<8;i++){
    var m=caps[i],cp=bd[m.tr][m.tc];
    if(m.promo&&m.promo.toUpperCase()!=='Q')continue;
    if(!m.ep&&!m.promo&&cp){if(sp+PVAL[cp.toUpperCase()]-PVAL[bd[m.fr][m.fc].toUpperCase()]+200<a)continue;}
    var nb=applyMv(bd,m);if(inChk(nb,clr))continue;
    var sc=-quies(nb,clr==='w'?'b':'w',null,-b,-a,dep-1);
    if(sc>=b)return b;if(sc>a)a=sc;
  }
  return a;
}

function abSearch(bd,clr,dep,ep,a,b,isRoot){
  eNodes++;if(eNodes%512===0&&(Date.now()-eStart)>eLimit)return 0;
  if(dep<=0)return quies(bd,clr,ep,a,b,2);
  var mvs=legMoves(bd,clr,ep);
  if(mvs.length===0){return inChk(bd,clr)?-19999:0;}
  if(!isRoot)orderMv(mvs,bd);
  var best=-Infinity,opp=clr==='w'?'b':'w';
  for(var i=0;i<mvs.length;i++){
    var m=mvs[i],nb=applyMv(bd,m);
    var nxep=m.ep?null:(bd[m.fr][m.fc]&&bd[m.fr][m.fc].toUpperCase()==='P'&&Math.abs(m.tr-m.fr)===2?(FILES[m.fc]+''+(8-(m.fr+m.tr)/2)):null);
    var sc;
    if(i===0){sc=-abSearch(nb,opp,dep-1,nxep,-b,-a,false);}
    else{var red=(dep>=3&&i>=4&&!inChk(bd,clr)&&!bd[m.tr][m.tc]&&!m.promo&&!m.ep)?1:0;
      sc=-abSearch(nb,opp,dep-1-red,nxep,-a-1,-a,false);
      if(sc>a&&sc<b)sc=-abSearch(nb,opp,dep-1,nxep,-b,-a,false);
    }
    if(sc>best)best=sc;if(sc>a)a=sc;
    if(a>=b){
      if(!bd[m.tr][m.tc]){var ki=m.fr*8+m.fc;killers[1][ki]=killers[0][ki];killers[0][ki]={tr:m.tr,tc:m.tc};histT[ki][m.tr*8+m.tc]+=dep*dep;}
      return b;
    }
  }
  return best;
}

function findBest(bd,clr,maxD){
  initK();eNodes=0;eStart=Date.now();
  eLimit=maxD<=3?1500:maxD<=4?2000:maxD<=5?3000:4000;
  var mvs=legMoves(bd,clr,null);
  if(mvs.length===0)return null;if(mvs.length===1)return mvs[0];
  var bestM=mvs[0],bestS=-Infinity;
  for(var d=1;d<=maxD;d++){
    var curM=null,curS=-Infinity,abort=false;
    for(var i=0;i<mvs.length;i++){
      var m=mvs[i],nb=applyMv(bd,m),opp=clr==='w'?'b':'w';
      var nxep=m.ep?null:(bd[m.fr][m.fc]&&bd[m.fr][m.fc].toUpperCase()==='P'&&Math.abs(m.tr-m.fr)===2?(FILES[m.fc]+''+(8-(m.fr+m.tr)/2)):null);
      var sc=-abSearch(nb,opp,d-1,nxep,-Infinity,-Infinity+1,false);
      if(sc===null||sc===undefined){abort=true;break;}
      if(sc>curS){curS=sc;curM=m;}
    }
    if(abort)break;
    if(curM){bestM=curM;bestS=curS;}
    var el=Date.now()-eStart;
    updEng(bestS,d,eNodes,el);
    if(Math.abs(bestS)>19000)break;
    if(el>eLimit)break;
  }
  return bestM;
}

function makeMv(m){
  hist.push({b:board.map(function(r){return r.slice();}),t:turn,cs:castling,ep:epSquare,hm:halfmove,fm:fullmove,cW:capW.slice(),cB:capB.slice(),lm:lastMv});
  var mp=board[m.fr][m.fc],cap=board[m.tr][m.tc];
  if(cap){if(cOf(cap)==='w')capW.push(cap);else capB.push(cap);}
  if(m.ep){var epCap=board[m.fr][m.tc];if(epCap){if(cOf(epCap)==='w')capW.push(epCap);else capB.push(epCap);}}
  if(m.cas){board[m.fr][m.fc]=null;board[m.tr][m.tc]=mp;if(m.tc===6){board[m.fr][5]=board[m.fr][7];board[m.fr][7]=null;}else if(m.tc===2){board[m.fr][3]=board[m.fr][0];board[m.fr][0]=null;}}
  else if(m.ep){board[m.tr][m.tc]=m.promo||mp;board[m.fr][m.fc]=null;board[m.fr][m.tc]=null;}
  else{board[m.tr][m.tc]=m.promo||mp;board[m.fr][m.fc]=null;}
  if(mp.toUpperCase()==='K'){if(cOf(mp)==='w')castling=castling.replace('K','').replace('Q','');else castling=castling.replace('k','').replace('q','');}
  if(mp.toUpperCase()==='R'){
    if(m.fr===7&&m.fc===7)castling=castling.replace('K','');if(m.fr===7&&m.fc===0)castling=castling.replace('Q','');
    if(m.fr===0&&m.fc===7)castling=castling.replace('k','');if(m.fr===0&&m.fc===0)castling=castling.replace('q','');
  }
  if(m.tr===0&&m.tc===0)castling=castling.replace('q','');if(m.tr===0&&m.tc===7)castling=castling.replace('k','');
  if(m.tr===7&&m.tc===0)castling=castling.replace('Q','');if(m.tr===7&&m.tc===7)castling=castling.replace('K','');
  if(!castling)castling='-';
  if(mp.toUpperCase()==='P'&&Math.abs(m.tr-m.fr)===2)epSquare=FILES[m.fc]+''+(8-(m.fr+m.tr)/2);else epSquare=null;
  if(mp.toUpperCase()==='P'||cap||m.ep)halfmove=0;else halfmove++;
  if(turn==='b')fullmove++;
  lastMv={fr:m.fr,fc:m.fc,tr:m.tr,tc:m.tc};
  turn=turn==='w'?'b':'w';selSq=null;selMoves=[];
}

function sqNm(r,c){return FILES[c]+(8-r);}
function toSAN(m,pc,cap){
  if(m.cas)return m.tc===6?'O-O':'O-O-O';
  var s='',t=pc.toUpperCase();
  if(t!=='P')s+=t;if(cap){if(t==='P')s+=FILES[m.fc];s+='x';}
  s+=sqNm(m.tr,m.tc);if(m.promo)s+='='+m.promo.toUpperCase();
  var nb=applyMv(board,m),opp=turn==='w'?'b':'w';
  if(inChk(nb,opp)){var has=false;var nms=pMoves(nb,opp,null);for(var i=0;i<nms.length;i++){var nn=applyMv(nb,nms[i]);if(!inChk(nn,opp)){has=true;break;}}s+=has?'+':'#';}
  return s;
}

    if(pc&&pc.toUpperCase()==='K'&&cOf(pc)===turn&&inChk(board,turn))sq.className+=' chk';
    if(dc===0){var rk=document.createElement('span');rk.className='cd cr';rk.textContent=8-r;sq.appendChild(rk);}
    if(dr===7){var fl=document.createElement('span');fl.className='cd cf';fl.textContent=FILES[c];sq.appendChild(fl);}
    if(pc){var sp=document.createElement('div');sp.className='piece-wrap';sp.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;';sp.innerHTML=getPieceHTML(pc);sq.appendChild(sp);}
    if(selMoves.some(function(m){return m.tr===r&&m.tc===c;})){
      if(pc){var rg=document.createElement('div');rg.className='ring';sq.appendChild(rg);}
      else{var dt=document.createElement('div');dt.className='dot';sq.appendChild(dt);}
    }
    (function(rr,cc){sq.addEventListener('click',function(){onClick(rr,cc);});})(r,c);
    boardEl.appendChild(sq);
  }
  renderLbl();renderHist();renderCap();updStatus();updTimer();
}

function renderLbl(){
  var fl=document.getElementById('flbl'),rl=document.getElementById('rlbl');fl.innerHTML='';rl.innerHTML='';
  var fs=flipped?'hgfedcba'.split(''):'abcdefgh'.split('');
  var rs=flipped?['1','2','3','4','5','6','7','8']:['8','7','6','5','4','3','2','1'];
  fs.forEach(function(f){var s=document.createElement('span');s.textContent=f;fl.appendChild(s);});
  rs.forEach(function(r){var s=document.createElement('span');s.textContent=r;rl.appendChild(s);});
}

function renderHist(){
  var el=document.getElementById('mhist');el.innerHTML='';
  for(var i=0;i<hist.length;i+=2){
    var row=document.createElement('div');row.className='mr';
    var n=document.createElement('span');n.className='mn';n.textContent=(Math.floor(i/2)+1)+'.';row.appendChild(n);
    var w=document.createElement('span');w.className='mc';if(hist[i])w.textContent=hist[i].san;row.appendChild(w);
    var b=document.createElement('span');b.className='mc';if(hist[i+1])b.textContent=hist[i+1].san;row.appendChild(b);
    el.appendChild(row);
  }
  el.scrollTop=el.scrollHeight;
}

function renderCap(){
  var w=document.getElementById('capW'), b=document.getElementById('capB');
  w.innerHTML=''; b.innerHTML='';
  capW.forEach(function(p){ var d=document.createElement('div'); d.innerHTML=getPieceHTML(p); d.firstChild.style.width='28px'; d.firstChild.style.height='28px'; w.appendChild(d.firstChild); });
  capB.forEach(function(p){ var d=document.createElement('div'); d.innerHTML=getPieceHTML(p); d.firstChild.style.width='28px'; d.firstChild.style.height='28px'; b.appendChild(d.firstChild); });
}

function updStatus(){
  if(gameOver)return;
  if(!started){setSt('Clique em INICIAR PARTIDA','y');return;}
  var chk=inChk(board,turn);
  if(turn===pColor){setSt('Sua vez - '+(turn==='w'?'Brancas':'Pretas')+(chk?' - Xeque!':''),chk?'y':'g');}
  else{setSt('Maquina calculando...',chk?'y':'r');}
  document.getElementById('pnlW').classList.toggle('on',turn==='w');
  document.getElementById('pnlB').classList.toggle('on',turn==='b');
  document.getElementById('einfo').style.display=(turn!==pColor)?'block':'none';
}
function setSt(t,c){stxt.textContent=t;sdot.className='sd '+c;}

function updEng(s,d,n,t){
  var ev=s>19000?'M'+Math.ceil((20001-s)/2):s<-19000?'-M'+Math.ceil((20001+s)/2):(s/100).toFixed(2);
  document.getElementById('evSc').textContent=ev;
  document.getElementById('evSc').style.color=s>0?'var(--gn)':s<0?'var(--rd)':'var(--t2)';
  document.getElementById('evDp').textContent=d;
  document.getElementById('evNs').textContent=Math.floor(n/(t/1000)||1).toLocaleString();
}

function onClick(r,c){
  if(gameOver||thinking||!started||turn!==pColor)return;
  var pc=board[r][c];
  if(selSq){
    var mvs=selMoves.filter(function(m){return m.tr===r&&m.tc===c;});
    if(mvs.length===0){
      if(pc&&cOf(pc)===turn){selSq=[r,c];selMoves=legMoves(board,turn,epSquare).filter(function(m){return m.fr===r&&m.fc===c;});render();}
      else{selSq=null;selMoves=[];render();}
      return;
    }
    if(mvs.length===1)execMv(mvs[0]);else showPromo(mvs);
    return;
  }
  if(pc&&cOf(pc)===turn){selSq=[r,c];selMoves=legMoves(board,turn,epSquare).filter(function(m){return m.fr===r&&m.fc===c;});render();}
}

function execMv(m){
  var mp=board[m.fr][m.fc],cap=board[m.tr][m.tc];
  var san=toSAN(m,mp,cap);
  makeMv(m);hist[hist.length-1].san=san;
  render();if(!chkGO())aiTurn();
}

function showPromo(mvs){
  var md=document.getElementById('promoM'),op=document.getElementById('promoO');op.innerHTML='';
  var ts=['Q','R','B','N'],cl=turn;
  ts.forEach(function(t){
    var btn=document.createElement('button');btn.className='pbtn';
    var p=cl==='w'?t:t.toLowerCase();btn.innerHTML=getPieceHTML(p);
    btn.style.background='rgba(255,255,255,.06)';
    btn.onclick=function(){md.classList.remove('vis');var mm=mvs.find(function(mv){return mv.promo===p;});if(mm)execMv(mm);};
    op.appendChild(btn);
  });
  md.classList.add('vis');
}

function aiTurn(){
  if(gameOver||!started)return;
  if(turn===pColor){render();return;}
  thinking=true;
  document.getElementById('think').classList.add('vis');
  document.getElementById('einfo').style.display='block';
  updStatus();
  setTimeout(function(){
    try{
      var aiClr=pColor==='w'?'b':'w';
      var bm=findBest(board,aiClr,diff);
      thinking=false;document.getElementById('think').classList.remove('vis');
      if(!bm||gameOver){chkGO();render();return;}
      var mp=board[bm.fr][bm.fc],cap=board[bm.tr][bm.tc];
      var san=toSAN(bm,mp,cap);
      makeMv(bm);hist[hist.length-1].san=san;
      render();chkGO();
    }catch(e){
      console.error('Engine error:',e);
      thinking=false;document.getElementById('think').classList.remove('vis');
      var aiClr=pColor==='w'?'b':'w';
      var fm=legMoves(board,aiClr,null);
      if(fm.length>0){var m=fm[Math.floor(Math.random()*fm.length)];makeMv(m);hist[hist.length-1].san='...';}
      render();chkGO();
    }
  },50);
}

function chkGO(){
  if(gameOver)return true;
  if(!legMoves(board,turn,epSquare).length){
    gameOver=true;stopTmr();
    if(inChk(board,turn)){
      var w=turn==='w'?'Pretas':'Brancas',pw=(turn!==pColor);
      showGO(pw?'Vitoria!':'Derrota',w+' venceram por cheque-mate!',pw?'\u2614':'\u2639');
    }else showGO('Empate','Afogamento','\u2614');
    return true;
  }
  if(halfmove>=100){gameOver=true;stopTmr();showGO('Empate','Regra das 50 jogadas','\u2614');return true;}
  var pc={w:[],b:[]};
  for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=board[r][c];if(p&&p.toUpperCase()!=='K'&&p.toUpperCase()!=='P')pc[cOf(p)].push(p.toUpperCase());}
  if(pc.w.length===0&&pc.b.length===0){gameOver=true;stopTmr();showGO('Empate','Material insuficiente','\u2614');return true;}
  if(pc.w.length===0&&pc.b.length===1&&(pc.b[0]==='B'||pc.b[0]==='N')){gameOver=true;stopTmr();showGO('Empate','Material insuficiente','\u2614');return true;}
  if(pc.b.length===0&&pc.w.length===1&&(pc.w[0]==='B'||pc.w[0]==='N')){gameOver=true;stopTmr();showGO('Empate','Material insuficiente','\u2614');return true;}
  return false;
}

function showGO(t,d,i){document.getElementById('goI').textContent=i;document.getElementById('goT').textContent=t;document.getElementById('goD').textContent=d;document.getElementById('goM').classList.add('vis');}

function startTmr(){
  stopTmr();if(tMinutes<=0)return;
  timerI=setInterval(function(){
    if(gameOver||thinking)return;
    if(turn==='w')wTime--;else bTime--;
    if(wTime<=0){wTime=0;gameOver=true;stopTmr();showGO('Tempo Esgotado','Brancas perderam por tempo','\u23F0');}
    if(bTime<=0){bTime=0;gameOver=true;stopTmr();showGO('Tempo Esgotado','Pretas perderam por tempo','\u23F0');}
    updTimer();
  },1000);
}
function stopTmr(){if(timerI){clearInterval(timerI);timerI=null;}}
function updTimer(){
  var f=function(t){var m=Math.floor(t/60),s=t%60;return m+':'+(s<10?'0':'')+s;};
  var wt=document.getElementById('tmrW'),bt=document.getElementById('tmrB');
  wt.textContent=f(wTime);bt.textContent=f(bTime);
  var wLow=wTime<=30&&tMinutes>0,bLow=bTime<=30&&tMinutes>0;
  wt.classList.toggle('lt',wLow);bt.classList.toggle('lt',bLow);
}

function newGame(){
  document.getElementById('goM').classList.remove('vis');
  var p=pFEN('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
  board=p.board;turn=p.turn;castling=p.castling;epSquare=p.ep;halfmove=p.halfmove;fullmove=p.fullmove;
  selSq=null;selMoves=[];lastMv=null;hist=[];capW=[];capB=[];
  gameOver=false;thinking=false;started=false;
  wTime=tMinutes*60;bTime=tMinutes*60;
  stopTmr();render();
  document.getElementById('btnStart').style.display='';
}

function startMatch(){
  if(started||gameOver)return;
  started=true;
  document.getElementById('btnStart').style.display='none';
  startTmr();render();
  if(pColor==='b')aiTurn();
}

function undo(){
  if(thinking||gameOver||hist.length<2)return;
  var tgt=hist.length-2;
  while(hist.length>tgt){var s=hist.pop();board=s.b;turn=s.t;castling=s.cs;epSquare=s.ep;halfmove=s.hm;fullmove=s.fm;capW=s.cW;capB=s.cB;lastMv=s.lm;}
  selSq=null;selMoves=[];render();
}

function flip(){flipped=!flipped;render();}
function resign(){if(gameOver)return;gameOver=true;stopTmr();var w=pColor==='w'?'Pretas':'Brancas';showGO(pColor==='w'?'Derrota':'Vitoria',w+' venceram por rendicao',pColor==='w'?'\u2639':'\u2614');}
function toggleCfg(){document.getElementById('cfgP').classList.toggle('open');}
function onDiff(){var v=document.getElementById('selDiff').value;var ds={1:3,2:4,3:5,4:6};diff=ds[+v];var ls={1:'FACIL',2:'MEDIO',3:'DIFICIL',4:'EXPERT'};var cs={1:'e',2:'m',3:'h',4:'x'};document.getElementById('badge').textContent=ls[+v];document.getElementById('badge').className='db '+cs[+v];}
function onTmr(){tMinutes=+document.getElementById('selTmr').value;}
function onClr(){pColor=document.getElementById('selClr').value;newGame();}

document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='Escape'){document.getElementById('goM').classList.remove('vis');document.getElementById('promoM').classList.remove('vis');}
});

newGame();
</script>
</body>
</html>
