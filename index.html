<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xadrez Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--sf:rgba(22,27,34,.92);--sf2:#161b22;--sf3:#30363d;
  --ac:#58a6ff;--ac2:#1f6feb;--gn:#3fb950;--rd:#f85149;--yw:#d29922;
  --tx:#e6edf3;--t2:#8b949e;--lt:#F0D9B5;--dk:#B58863;
  --r:12px;--rs:8px;--sh:0 10px 40px rgba(0,0,0,.65)
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
body{display:flex;justify-content:center;align-items:center;background:linear-gradient(160deg,#0b0e14 0%,#0d1117 40%,#161b22 100%)}
.app{display:grid;grid-template-columns:240px 1fr 240px;grid-template-rows:auto 1fr;gap:0;height:100vh;max-width:1440px;width:100%}
.hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--sf3);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.logo-i{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),#a371f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(88,166,255,.3)}
.hdr-c{display:flex;align-items:center;gap:10px}
.sb{background:var(--sf);padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;backdrop-filter:blur(12px)}
.sb-l{border-right:1px solid var(--sf3)}.sb-r{border-left:1px solid var(--sf3)}
.pp{border-radius:var(--r);padding:12px;background:var(--sf2);border:2px solid transparent;transition:all .25s ease}
.pp.on{border-color:var(--ac);box-shadow:0 0 20px rgba(88,166,255,.06)}
.pp.on .ind{background:var(--gn);box-shadow:0 0 8px rgba(63,185,80,.5)}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ind{width:9px;height:9px;border-radius:50%;background:var(--sf3);transition:all .25s}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.pn{font-size:13px;font-weight:600;flex:1}
.pt{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:26px;font-weight:700;letter-spacing:2px;text-align:center;margin:4px 0}
.pt.lt{color:var(--rd);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.pcs{display:flex;flex-wrap:wrap;gap:1px;min-height:22px;margin-top:4px}
.pcs svg{width:26px;height:34px}
.ei{margin-top:6px;padding-top:6px;border-top:1px solid var(--sf3)}
.el{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);line-height:1.7}
.el .v{color:var(--tx);font-weight:600;font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.ct{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px}
.ba{position:relative}
.fl{display:flex;padding:0 0 4px}
.fl span{width:calc(min(720px,calc(100vh - 100px))/8);text-align:center;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase}
.rl{position:absolute;left:-22px;top:0;bottom:0;display:flex;flex-direction:column}
.rl span{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);width:18px}
.bd{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(720px,calc(100vh - 100px));aspect-ratio:1;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh),0 0 0 1px rgba(255,255,255,.04);user-select:none;position:relative;touch-action:none}
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s ease;overflow:hidden}
.sq.l{background:var(--lt)}.sq.d{background:var(--dk)}
.sq.l::after,.sq.d::after{content:'';position:absolute;inset:0;opacity:.08;pointer-events:none;background:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 5px),repeating-linear-gradient(0deg,transparent,transparent 6px,rgba(0,0,0,.03) 6px,rgba(0,0,0,.03) 8px)}
.sq.sel{background:rgba(20,110,45,.55)!important}
.sq.last-from{background:rgba(255,220,50,.35)!important}
.sq.last-to{background:rgba(255,220,50,.45)!important}
.sq.chk{background:radial-gradient(ellipse at center,rgba(255,30,30,.7) 0%,rgba(255,0,0,.25) 60%,transparent 100%)!important}
.sq .dot{position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(0,0,0,.25);z-index:1;pointer-events:none}
.sq .ring{position:absolute;width:84%;height:84%;border-radius:50%;border:5px solid rgba(0,0,0,.25);z-index:1;pointer-events:none}
.sq .pw{position:relative;z-index:2;pointer-events:none;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;transition:transform .15s ease-out,filter .15s ease-out}
.sq:hover .pw{transform:scale(1.06)}
.sq .pw svg{width:88%;height:88%;overflow:visible;pointer-events:none}
.sq.drag-over{outline:3px solid var(--ac);outline-offset:-3px;z-index:5}
.cd{position:absolute;font-size:10px;font-weight:700;z-index:3;pointer-events:none;opacity:.65}
.cf{bottom:2px;right:4px}.cr{top:2px;left:4px}
.sq.l .cd{color:var(--dk)}.sq.d .cd{color:var(--lt)}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.92;transform:scale(1.15);filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));transition:none;width:calc(min(720px,calc(100vh - 100px))/8);height:calc(min(720px,calc(100vh - 100px))/8);display:flex;align-items:center;justify-content:center}
.drag-ghost svg{width:88%;height:88%;overflow:visible}
.st{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sf);border-radius:var(--r);font-size:13px;min-height:38px;border:1px solid var(--sf3);width:100%;max-width:min(720px,calc(100vh - 100px))}
.sd{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;flex-shrink:0}
.sd.g{background:var(--gn);color:var(--gn)}.sd.r{background:var(--rd);color:var(--rd)}.sd.y{background:var(--yw);color:var(--yw)}
.stx{flex:1;font-weight:500}
.bg{display:flex;gap:6px;flex-wrap:wrap}
.bt{padding:7px 14px;border:1px solid var(--sf3);border-radius:var(--rs);background:var(--sf2);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s ease;text-transform:uppercase;letter-spacing:.5px}
.bt:hover{background:var(--sf3);border-color:rgba(255,255,255,.12)}.bt:active{transform:scale(.96)}
.bt.pr{background:linear-gradient(135deg,var(--ac2),#a371f7);border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(31,111,235,.3)}
.bt.pr:hover{opacity:.9;box-shadow:0 4px 16px rgba(31,111,235,.4)}
.bt.dg{border-color:var(--rd);color:var(--rd)}.bt.dg:hover{background:rgba(248,81,73,.1)}
.hp{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hp h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:6px}
.mh{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.mh::-webkit-scrollbar{width:4px}.mh::-webkit-scrollbar-track{background:transparent}.mh::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:3px}
.mr{display:grid;grid-template-columns:28px 1fr 1fr;gap:1px;font-size:12px;font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.mn{color:var(--sf3);text-align:right;padding-right:6px;line-height:24px}
.mc{padding:2px 6px;border-radius:4px;line-height:24px;cursor:pointer;transition:background .12s}
.mc:hover{background:rgba(255,255,255,.05)}.mc.cur{background:rgba(88,166,255,.12);color:var(--ac)}
.db{display:inline-flex;align-items:center;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.db.e{background:rgba(63,185,80,.15);color:var(--gn)}.db.m{background:rgba(210,153,34,.15);color:var(--yw)}
.db.h{background:rgba(219,109,40,.15);color:#db6d28}.db.x{background:rgba(248,81,73,.15);color:var(--rd)}
.sp{padding:10px;background:var(--sf2);border-radius:var(--r);display:none;border:1px solid var(--sf3);margin-top:4px}
.sp.open{display:block}
.sr{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px}
.sr label{color:var(--t2)}.sr select{background:var(--sf3);border:1px solid var(--sf3);color:var(--tx);border-radius:var(--rs);padding:4px 8px;font-size:12px;min-width:100px;cursor:pointer}
.to{position:absolute;inset:0;background:rgba(0,0,0,.15);display:none;align-items:center;justify-content:center;border-radius:var(--r);z-index:20;backdrop-filter:blur(3px)}
.to.vis{display:flex}
.tt{background:rgba(22,27,34,.95);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);border:1px solid var(--sf3)}
.td{display:flex;gap:5px}.td span{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:bnc .6s infinite}
.td span:nth-child(2){animation-delay:.15s}.td span:nth-child(3){animation-delay:.3s}
@keyframes bnc{50%{transform:translateY(-5px)}}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(6px)}
.mo.vis{display:flex}
.mdl{background:rgba(22,27,34,.96);border:1px solid var(--sf3);border-radius:16px;padding:32px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.6);min-width:300px;backdrop-filter:blur(12px)}
.mdl h2{font-size:24px;margin-bottom:8px}.mdl p{color:var(--t2);margin-bottom:20px;font-size:14px}
.mdl .ri{font-size:48px;margin-bottom:12px}
.pm{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(6px)}
.pm.vis{display:flex}
.pbx{background:rgba(22,27,34,.96);border:1px solid var(--sf3);border-radius:16px;padding:24px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.6);backdrop-filter:blur(12px)}
.pbx h3{margin-bottom:16px;font-size:16px}
.pos{display:flex;gap:12px;justify-content:center}
.pbtn{width:76px;height:76px;font-size:46px;border:2px solid var(--sf3);border-radius:var(--r);background:var(--sf2);cursor:pointer;transition:all .18s ease;display:flex;align-items:center;justify-content:center}
.pbtn:hover{transform:scale(1.12);border-color:var(--ac);box-shadow:0 4px 16px rgba(88,166,255,.2)}
.pbtn svg{width:56px;height:72px;overflow:visible}
.sf-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(63,185,80,.12);color:var(--gn);text-transform:uppercase;letter-spacing:.3px}
.sf-badge.off{background:rgba(248,81,73,.12);color:var(--rd)}
.sf-badge.load{background:rgba(210,153,34,.12);color:var(--yw)}
.sf-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(163,113,247,.12);color:#a371f7;text-transform:uppercase;letter-spacing:.3px}
.ai-badge.off{background:rgba(100,100,100,.12);color:var(--t2)}
@media(max-width:1100px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sb{flex-direction:row;flex-wrap:wrap;padding:8px;gap:8px}
  .sb-l,.sb-r{border:none}
  .ct{padding:6px}
  .bd{width:min(95vw,500px)}
  .fl span{width:calc(min(95vw,500px)/8)}
  .rl span{width:14px}
  .hp{display:none}
  .drag-ghost{width:calc(min(95vw,500px)/8);height:calc(min(95vw,500px)/8)}
}
</style>
</head>

function pstIndex(r,c){return(7-r)*8+c;}
function pstIndexInv(r,c){return r*8+c;}

function evaluate(chess){
  var board=chess.board();
  var mg=[0,0],eg=[0,0],phase=0;
  for(var r=0;r<8;r++){
    for(var c=0;c<8;c++){
      var pc=board[r][c];
      if(!pc)continue;
      var color=pc.color==='w'?0:1;
      var idx=color===0?pstIndex(r,c):pstIndexInv(r,c);
      mg[color]+=PIECE_VAL[pc.type]+PST_MG[pc.type][idx];
      eg[color]+=PIECE_VAL[pc.type]+PST_EG[pc.type][idx];
      phase+=PHASE_VAL[pc.type];
    }
  }
  var ph=phase/TOTAL_PHASE;
  if(ph>1)ph=1;
  var score=(mg[0]*ph+eg[0]*(1-ph))-(mg[1]*ph+eg[1]*(1-ph));
  score+=evalPawns(board);
  score+=evalKingSafety(board);
  return score;
}

function evalPawns(board){
  var score=0;
  var wp=[],bp=[];
  for(var r=0;r<8;r++){
    for(var c=0;c<8;c++){
      var pc=board[r][c];
      if(!pc)continue;
      if(pc.color==='w'&&pc.type==='p')wp.push({r:r,c:c});
      if(pc.color==='b'&&pc.type==='p')bp.push({r:r,c:c});
    }
  }
  var wFiles={},bFiles={};
  wp.forEach(function(p){wFiles[p.c]=(wFiles[p.c]||0)+1;});
  bp.forEach(function(p){bFiles[p.c]=(bFiles[p.c]||0)+1;});
  wp.forEach(function(p){
    if(wFiles[p.c]>1)score-=12;
    var iso=true;
    for(var f=Math.max(0,p.c-1);f<=Math.min(7,p.c+1);f++){
      if(f===p.c)continue;
      if(wFiles[f]){iso=false;break;}
    }
    if(iso)score-=14;
    var passed=true;
    for(var r2=0;r2<p.r;r2++){
      for(var fc=Math.max(0,p.c-1);fc<=Math.min(7,p.c+1);fc++){
        if(board[r2][fc]&&board[r2][fc].color==='b'&&board[r2][fc].type==='p'){passed=false;break;}
      }
      if(!passed)break;
    }
    if(passed)score+=20+p.r*10;
  });
  bp.forEach(function(p){
    if(bFiles[p.c]>1)score+=12;
    var iso=true;
    for(var f=Math.max(0,p.c-1);f<=Math.min(7,p.c+1);f++){
      if(f===p.c)continue;
      if(bFiles[f]){iso=false;break;}
    }
    if(iso)score+=14;
    var passed=true;
    for(var r2=p.r+1;r2<8;r2++){
      for(var fc=Math.max(0,p.c-1);fc<=Math.min(7,p.c+1);fc++){
        if(board[r2][fc]&&board[r2][fc].color==='w'&&board[r2][fc].type==='p'){passed=false;break;}
      }
      if(!passed)break;
    }
    if(passed)score-=20+(7-p.r)*10;
  });
  return score;
}

function evalKingSafety(board){
  var score=0;
  for(var c=0;c<8;c++){
    if(board[6][c]&&board[6][c].color==='w'&&board[6][c].type==='k'){
      var shelter=0;
      if(c>0&&board[7][c-1]&&board[7][c-1].type==='p'&&board[7][c-1].color==='w')shelter++;
      if(board[7][c]&&board[7][c].type==='p'&&board[7][c].color==='w')shelter++;
      if(c<7&&board[7][c+1]&&board[7][c+1].type==='p'&&board[7][c+1].color==='w')shelter++;
      if(c>0&&board[6][c-1]&&board[6][c-1].type==='p'&&board[6][c-1].color==='w')shelter++;
      if(c<7&&board[6][c+1]&&board[6][c+1].type==='p'&&board[6][c+1].color==='w')shelter++;
      score+=shelter*8;
    }
    if(board[1][c]&&board[1][c].color==='b'&&board[1][c].type==='k'){
      var shelter=0;
      if(c>0&&board[0][c-1]&&board[0][c-1].type==='p'&&board[0][c-1].color==='b')shelter++;
      if(board[0][c]&&board[0][c].type==='p'&&board[0][c].color==='b')shelter++;
      if(c<7&&board[0][c+1]&&board[0][c+1].type==='p'&&board[0][c+1].color==='b')shelter++;
      if(c>0&&board[1][c-1]&&board[1][c-1].type==='p'&&board[1][c-1].color==='b')shelter++;
      if(c<7&&board[1][c+1]&&board[1][c+1].type==='p'&&board[1][c+1].color==='b')shelter++;
      score-=shelter*8;
    }
  }
  return score;
}

function mvvLva(m){
  var score=0;
  if(m.captured)score=PIECE_VAL[m.captured]*10-PIECE_VAL[m.piece]+10000;
  if(m.promotion)score+=PIECE_VAL[m.promotion]*8;
  if(m.san&&m.san.indexOf('#')>=0)score+=50000;
  else if(m.san&&m.san.indexOf('+')>=0)score+=5000;
  return score;
}

function orderMoves(chess,moves,killers,history,ply){
  var scored=[];
  var isCheck=chess.in_check();
  for(var i=0;i<moves.length;i++){
    var m=moves[i];
    var s=0;
    if(m.captured)s+=PIECE_VAL[m.captured]*10-PIECE_VAL[m.piece]+10000;
    if(m.promotion)s+=PIECE_VAL[m.promotion]*8+9000;
    if(m.san&&m.san.indexOf('#')>=0)s+=50000;
    else if(m.san&&m.san.indexOf('+')>=0)s+=5000;
    if(killers){
      for(var k=0;k<killers.length;k++){
        if(killers[k]&&killers[k].from===m.from&&killers[k].to===m.to){s+=8000;break;}
      }
    }
    if(history){
      var hk=m.from+m.to;
      if(history[hk])s+=history[hk];
    }
    scored.push({move:m,score:s});
  }
  scored.sort(function(a,b){return b.score-a.score;});
  var result=[];
  for(var i=0;i<scored.length;i++)result.push(scored[i].move);
  return result;
}

function isQuiet(m){
  return!m.captured&&!m.promotion;
}

function ChessAIClass(){
  this.stopFlag=false;
  this.nodes=0;
  this.killerMoves={};
  this.historyTable={};
  this.maxDepth=12;
  this.timeLimit=3000;
  this.startTime=0;
  this.bestMove=null;
  this.onComplete=null;
}

ChessAIClass.prototype.search=function(chess,depth,timeLimit,callback){
  var self=this;
  self.stopFlag=false;
  self.nodes=0;
  self.killerMoves={};
  self.historyTable={};
  self.maxDepth=depth||12;
  self.timeLimit=timeLimit||3000;
  self.startTime=Date.now();
  self.bestMove=null;
  self.onComplete=callback;

  var color=chess.turn()==='w'?1:-1;
  var bestMove=null;
  var depthReached=0;

  function iterativeDeepening(){
    for(var d=1;d<=self.maxDepth;d++){
      if(self.stopFlag)break;
      var elapsed=Date.now()-self.startTime;
      if(elapsed>self.timeLimit*0.6&&d>1)break;

      var result=self.negamax(chess,d,-Infinity,Infinity,color,0);

      if(!self.stopFlag&&result.move){
        bestMove=result.move;
        depthReached=d;
        self.bestMove=result.move;
      }

      elapsed=Date.now()-self.startTime;
      if(elapsed>self.timeLimit*0.4)break;
    }

    if(self.onComplete){
      self.onComplete(bestMove,depthReached,self.nodes,Date.now()-self.startTime);
    }
  }

  setTimeout(iterativeDeepening,10);
};

ChessAIClass.prototype.negamax=function(chess,depth,alpha,beta,color,ply){
  if(this.stopFlag)return{score:0,move:null};

  var elapsed=Date.now()-this.startTime;
  if(elapsed>this.timeLimit){this.stopFlag=true;return{score:0,move:null};}

  this.nodes++;

  if(depth<=0)return this.quiescence(chess,alpha,beta,color,4);

  var moves=chess.moves({verbose:true});
  if(moves.length===0){
    if(chess.in_check())return{score:-30000+ply,move:null};
    return{score:0,move:null};
  }

  if(!this.killerMoves[ply])this.killerMoves[ply]=[null,null];

  var inCheck=chess.in_check();
  if(!inCheck&&depth>=3){
    var R=3;
    var fen=chess.fen();
    var parts=fen.split(' ');
    parts[1]=parts[1]==='w'?'b':'w';
    parts[3]='-';
    var nullFen=parts.join(' ');
    var nullBoard=new Chess(nullFen);
    if(nullBoard.moves().length>0){
      var nullScore=-this.negamax(nullBoard,depth-1-R,-beta,-beta+1,-color,ply+1).score;
      if(nullScore>=beta)return{score:beta,move:null};
    }
  }

  var ordered=moves;
  if(depth>1)ordered=orderMoves(chess,moves,this.killerMoves[ply],this.historyTable,ply);

  var bestScore=-Infinity;
  var bestMove=ordered[0]||null;

  for(var i=0;i<ordered.length;i++){
    if(this.stopFlag)return{score:bestScore,move:bestMove};

    var m=ordered[i];
    chess.move(m.san);
    var isLm=i>=4&&!inCheck&&depth>3&&isQuiet(m)&&!chess.in_check();
    var score;

    if(isLm&&depth>3){
      score=-this.negamax(chess,depth-2,-alpha-1,-beta,-color,ply+1).score;
      if(score<=alpha){
        chess.undo();
        continue;
      }
    }

    if(i===0){
      score=-this.negamax(chess,depth-1,-beta,-alpha,-color,ply+1).score;
    }else{
      score=-this.negamax(chess,depth-1,-alpha-1,-alpha,-color,ply+1).score;
      if(score>alpha&&score<beta){
        score=-this.negamax(chess,depth-1,-beta,-alpha,-color,ply+1).score;
      }
    }

    chess.undo();

    if(score>bestScore){
      bestScore=score;
      bestMove=m;
      if(score>alpha)alpha=score;
      if(alpha>=beta){
        if(isQuiet(m)){
          if(this.killerMoves[ply]){
            if(this.killerMoves[ply][0]!==m)this.killerMoves[ply][1]=this.killerMoves[ply][0];
            this.killerMoves[ply][0]=m;
          }
          var hk=m.from+m.to;
          this.historyTable[hk]=(this.historyTable[hk]||0)+depth*depth;
        }
        break;
      }
    }
  }

  return{score:bestScore,move:bestMove};
};

ChessAIClass.prototype.quiescence=function(chess,alpha,beta,color,qsDepth){
  if(this.stopFlag)return{score:0};

  this.nodes++;
  var standPat=color*evaluate(chess);

  if(qsDepth<=0)return{score:standPat};
  if(standPat>=beta)return{score:beta};
  if(standPat>alpha)alpha=standPat;

  var moves=chess.moves({verbose:true});
  var captures=[];
  for(var i=0;i<moves.length;i++){
    if(moves[i].captured||moves[i].promotion)captures.push(moves[i]);
  }

  captures.sort(function(a,b){
    var sa=0,sb=0;
    if(a.captured)sa+=PIECE_VAL[a.captured]*10-PIECE_VAL[a.piece];
    if(b.captured)sb+=PIECE_VAL[b.captured]*10-PIECE_VAL[b.piece];
    if(a.promotion)sa+=PIECE_VAL[a.promotion]*8;
    if(b.promotion)sb+=PIECE_VAL[b.promotion]*8;
    return sb-sa;
  });

  var bestScore=standPat;
  for(var i=0;i<captures.length;i++){
    if(this.stopFlag)break;
    var m=captures[i];
    chess.move(m.san);
    var score=-this.quiescence(chess,-beta,-alpha,-color,qsDepth-1).score;
    chess.undo();
    if(score>bestScore)bestScore=score;
    if(score>alpha)alpha=score;
    if(alpha>=beta)break;
  }

  return{score:bestScore};
};

return ChessAIClass;
})();

/* ====== Stockfish Integration ====== */
var stockfish=null,stockfishReady=false,useFallback=true;
var sfEval=0,sfDepth=0,sfNodes=0,sfTime=0;

function initStockfish(){
  try{
    stockfish=new Worker('https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js');
    stockfish.onmessage=function(e){
      var line=typeof e.data==='string'?e.data:'';
      if(line==='uciok'){
        stockfish.postMessage('isready');
      }else if(line==='readyok'){
        stockfishReady=true;useFallback=false;
        updateSFBadge('on');
        stockfish.postMessage('setoption name Skill Level value '+getSkillLevel());
      }else if(line.indexOf('bestmove')===0){
        onBestMove(line);
      }else if(line.indexOf('info')===0){
        parseInfo(line);
      }
    };
    stockfish.onerror=function(){
      useFallback=true;
      updateSFBadge('off');
      updateAIBadge();
    };
    stockfish.postMessage('uci');
    updateSFBadge('load');
  }catch(e){
    useFallback=true;
    updateSFBadge('off');
    updateAIBadge();
  }
}

function getSkillLevel(){
  var v=parseInt(document.getElementById('selDiff').value);
  return[3,10,15,20][v-1]||10;
}

function updateSFBadge(state){
  var el=document.getElementById('sfBadge');
  if(state==='on'){el.className='sf-badge';el.innerHTML='<span class="sf-dot"></span>Stockfish OK';}
  else if(state==='off'){el.className='sf-badge off';el.innerHTML='<span class="sf-dot"></span>SF Off';}
  else{el.className='sf-badge load';el.innerHTML='<span class="sf-dot"></span>Carregando...';}
}

function updateAIBadge(){
  var el=document.getElementById('aiBadge');
  if(useFallback){el.className='ai-badge';el.textContent='IA Custom';}
  else{el.className='ai-badge off';el.textContent='STOCKFISH';}
}

function parseInfo(line){
  var dm=line.match(/depth (\d+)/);
  var sc=line.match(/score (cp|mate) (-?\d+)/);
  var nd=line.match(/nodes (\d+)/);
  var tm=line.match(/time (\d+)/);
  if(dm)sfDepth=parseInt(dm[1]);
  if(nd)sfNodes=parseInt(nd[1]);
  if(tm)sfTime=parseInt(tm[1]);
  if(sc){
    if(sc[1]==='cp')sfEval=parseInt(sc[2]);
    else sfEval=parseInt(sc[2])>0?19999+parseInt(sc[2]):-19999-parseInt(sc[2]);
  }
  updEngDisplay();
}

function updEngDisplay(){
  var evStr;
  if(sfEval>19000)evStr='M'+Math.ceil((20001-sfEval)/2);
  else if(sfEval<-19000)evStr='-M'+Math.ceil((20001+sfEval)/2);
  else evStr=(sfEval/100).toFixed(2);
  var el=document.getElementById('evSc');
  el.textContent=evStr;
  el.style.color=sfEval>0?'var(--gn)':sfEval<0?'var(--rd)':'var(--t2)';
  document.getElementById('evDp').textContent=sfDepth;
  document.getElementById('evNs').textContent=sfTime>0?Math.floor(sfNodes/(sfTime/1000)).toLocaleString():'0';
}

/* ====== Game State ====== */
var chess=new Chess();
var flipped=false,gameOver=false,started=false,thinking=false;
var playerColor='w';
var engineDepth=12;
var tMinutes=10;
var wTime=600,bTime=600,timerI=null;
var lastMove=null;
var capturedW=[],capturedB=[];
var selectedSquare=null,selectedMoves=[];
var dragging=false,dragEl=null,dragFrom=null;
var boardEl,customAI=new ChessAI();

function sqName(r,c){return FILES[c]+(8-r);}
function fromSquare(name){return{name:name,r:8-parseInt(name[1]),c:FILES.indexOf(name[0])};}

function render(){renderBoard();renderLabels();renderHistory();renderCaptured();updateStatus();updateClocks();}

function renderBoard(){
  var oldSquares=boardEl.querySelectorAll('.sq');
  oldSquares.forEach(function(e){if(!e.classList.contains('to'))e.remove();});

  var board=chess.board();
  for(var dr=0;dr<8;dr++){
    for(var dc=0;dc<8;dc++){
      var r=flipped?7-dr:dr,c=flipped?7-dc:dc;
      var sq=document.createElement('div');
      var lt=(r+c)%2===0;
      sq.className='sq '+(lt?'l':'d');
      sq.dataset.r=r;sq.dataset.c=c;

      var sqStr=sqName(r,c);
      if(selectedSquare&&selectedSquare===sqStr)sq.className+=' sel';
      if(lastMove){
        if(lastMove.from===sqStr)sq.className+=' last-from';
        if(lastMove.to===sqStr)sq.className+=' last-to';
      }

      var piece=board[r][c];
      if(piece&&piece.type==='k'&&piece.color===chess.turn()&&chess.in_check()){
        sq.className+=' chk';
      }

      if(dc===0){var rk=document.createElement('span');rk.className='cd cr';rk.textContent=8-r;sq.appendChild(rk);}
      if(dr===7){var fl=document.createElement('span');fl.className='cd cf';fl.textContent=FILES[c];sq.appendChild(fl);}

      if(piece){
        var pcChar=piece.type;
        if(piece.color==='w')pcChar=pcChar.toUpperCase();
        sq.insertAdjacentHTML('beforeend',pieceHTML(pcChar));
      }

      var isLegalTarget=selectedMoves.some(function(m){return m.to===sqStr;});
      if(isLegalTarget){
        if(piece){var rg=document.createElement('div');rg.className='ring';sq.appendChild(rg);}
        else{var dt=document.createElement('div');dt.className='dot';sq.appendChild(dt);}
      }

      (function(sqStr,r,c){
        sq.addEventListener('mousedown',function(e){e.preventDefault();onSqMouseDown(sqStr,r,c,e);});
        sq.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];onSqMouseDown(sqStr,r,c,t);},{passive:false});
      })(sqStr,r,c);

      boardEl.appendChild(sq);
    }
  }
}

function renderLabels(){
  var fl=document.getElementById('flbl'),rl=document.getElementById('rlbl');
  fl.innerHTML='';rl.innerHTML='';
  var fs=flipped?'hgfedcba'.split(''):'abcdefgh'.split('');
  var rs=flipped?['1','2','3','4','5','6','7','8']:['8','7','6','5','4','3','2','1'];
  fs.forEach(function(f){var s=document.createElement('span');s.textContent=f;fl.appendChild(s);});
  rs.forEach(function(r){var s=document.createElement('span');s.textContent=r;rl.appendChild(s);});
}

function renderHistory(){
  var el=document.getElementById('mhist');el.innerHTML='';
  var hist=chess.history();
  for(var i=0;i<hist.length;i+=2){
    var row=document.createElement('div');row.className='mr';
    var n=document.createElement('span');n.className='mn';n.textContent=(Math.floor(i/2)+1)+'.';row.appendChild(n);
    var w=document.createElement('span');w.className='mc';w.textContent=hist[i]||'';
    if(i===hist.length-1||(i+1===hist.length-1&&hist.length%2===0))w.className+=' cur';
    row.appendChild(w);
    var b=document.createElement('span');b.className='mc';b.textContent=hist[i+1]||'';
    if(i+1===hist.length-1)b.className+=' cur';
    row.appendChild(b);
    el.appendChild(row);
  }
  el.scrollTop=el.scrollHeight;
}

function renderCaptured(){
  var wc=capturedW.slice().sort(function(a,b){var pv={p:1,n:3,b:3,r:5,q:9,k:0};return(pv[b]||0)-(pv[a]||0);});
  var bc=capturedB.slice().sort(function(a,b){var pv={p:1,n:3,b:3,r:5,q:9,k:0};return(pv[b]||0)-(pv[a]||0);});
  document.getElementById('capW').innerHTML=wc.map(function(p){return getPieceSVG(p);}).join('');
  document.getElementById('capB').innerHTML=bc.map(function(p){return getPieceSVG(p.toUpperCase());}).join('');
}

function updateStatus(){
  if(gameOver)return;
  if(!started){setSt('Clique em INICIAR PARTIDA','y');return;}
  var isChk=chess.in_check();
  if(chess.turn()===playerColor){
    setSt('Sua vez - '+(playerColor==='w'?'Brancas':'Pretas')+(isChk?' - Xeque!':''),isChk?'y':'g');
  }else{
    setSt(thinking?'IA calculando...':'Aguardando...',thinking?'r':'y');
  }
  document.getElementById('pnlW').classList.toggle('on',chess.turn()==='w');
  document.getElementById('pnlB').classList.toggle('on',chess.turn()==='b');
  document.getElementById('einfo').style.display=(chess.turn()!==playerColor&&started)?'block':'none';
}

function setSt(t,c){document.getElementById('stxt').textContent=t;document.getElementById('sdot').className='sd '+c;}
function showThinking(){document.getElementById('think').classList.add('vis');}
function hideThinking(){document.getElementById('think').classList.remove('vis');}

/* ====== Input Handling ====== */
function onSqMouseDown(sqStr,r,c,e){
  if(gameOver||thinking||!started||chess.turn()!==playerColor)return;
  var piece=chess.board()[r][c];

  if(selectedSquare){
    var targetMove=selectedMoves.find(function(m){return m.to===sqStr;});
    if(targetMove){
      if(targetMove.promotion){showPromotion(targetMove);}
      else{executePlayerMove(targetMove);}
      return;
    }
    if(piece&&piece.color===playerColor){
      startDrag(sqStr,r,c,e);
      selectedSquare=sqStr;
      selectedMoves=chess.moves({square:sqStr,verbose:true});
      render();
      return;
    }
    selectedSquare=null;selectedMoves=[];
    render();
    return;
  }

  if(piece&&piece.color===playerColor){
    startDrag(sqStr,r,c,e);
    selectedSquare=sqStr;
    selectedMoves=chess.moves({square:sqStr,verbose:true});
    render();
  }
}

function startDrag(sqStr,r,c,e){
  dragging=true;dragFrom=sqStr;
  var sqEl=boardEl.querySelector('.sq[data-r="'+r+'"][data-c="'+c+'"]');
  if(!sqEl)return;
  var pw=sqEl.querySelector('.pw');
  if(!pw)return;
  var piece=chess.board()[r][c];
  if(!piece)return;
  var pcChar=piece.type;
  if(piece.color==='w')pcChar=pcChar.toUpperCase();
  dragEl=document.createElement('div');
  dragEl.className='drag-ghost';
  dragEl.innerHTML=getPieceSVG(pcChar);
  document.body.appendChild(dragEl);
  pw.style.opacity='0.25';
  moveDrag(e);
}

function moveDrag(e){
  if(!dragging||!dragEl)return;
  var sq=boardEl.querySelector('.sq');
  if(!sq)return;
  var sz=sq.getBoundingClientRect();
  dragEl.style.width=sz.width+'px';
  dragEl.style.height=sz.height+'px';
  dragEl.style.left=(e.clientX-sz.width/2)+'px';
  dragEl.style.top=(e.clientY-sz.height/2)+'px';
  boardEl.querySelectorAll('.sq.drag-over').forEach(function(s){s.classList.remove('drag-over');});
  var el=document.elementFromPoint(e.clientX,e.clientY);
  if(el){
    var sq2=el.closest('.sq');
    if(sq2&&sq2.dataset.r!==undefined)sq2.classList.add('drag-over');
  }
}

function endDrag(e){
  if(!dragging)return;
  dragging=false;
  boardEl.querySelectorAll('.sq.drag-over').forEach(function(s){s.classList.remove('drag-over');});
  if(dragEl){
    var ex=e.clientX||0,ey=e.clientY||0;
    var el=document.elementFromPoint(ex,ey);
    if(el){
      var sq=el.closest('.sq');
      if(sq&&sq.dataset.r!==undefined){
        var tr=parseInt(sq.dataset.r),tc=parseInt(sq.dataset.c);
        var toSq=sqName(tr,tc);
        if(toSq!==dragFrom){
          var move=selectedMoves.find(function(m){return m.to===toSq;});
          if(move){
            if(move.promotion){showPromotion(move);}
            else{executePlayerMove(move);}
          }
        }
      }
    }
    dragEl.remove();dragEl=null;
  }
  selectedSquare=dragFrom;
  selectedMoves=chess.moves({square:dragFrom,verbose:true});
  render();
}

document.addEventListener('mousemove',function(e){if(dragging)moveDrag(e);});
document.addEventListener('mouseup',function(e){if(dragging)endDrag(e);});
document.addEventListener('touchmove',function(e){if(dragging){e.preventDefault();moveDrag(e.touches[0]);}},{passive:false});
document.addEventListener('touchend',function(e){if(dragging){var t=e.changedTouches[0];endDrag(t);}});

/* ====== Move Execution ====== */
function executePlayerMove(move){
  var result=chess.move(move);
  if(!result)return;
  lastMove={from:result.from,to:result.to};
  trackCaptured(result);
  selectedSquare=null;selectedMoves=[];
  stopPlayerClock();
  render();
  if(!checkGameOver()){
    requestEngineMove();
  }
}

function trackCaptured(move){
  if(move.captured){
    if(chess.turn()==='b')capturedW.push(move.captured);
    else capturedB.push(move.captured);
  }
}

function showPromotion(move){
  var md=document.getElementById('promoM'),op=document.getElementById('promoO');
  op.innerHTML='';
  var pieces=['q','r','b','n'];
  var names={q:'Dama',r:'Torre',b:'Bispo',n:'Cavalo'};
  pieces.forEach(function(p){
    var btn=document.createElement('button');btn.className='pbtn';
    var pcChar=playerColor==='w'?p.toUpperCase():p;
    btn.innerHTML='<div style="width:56px;height:72px">'+getPieceSVG(pcChar)+'</div>';
    btn.title=names[p];
    btn.addEventListener('click',function(){
      md.classList.remove('vis');
      executePlayerMove({from:move.from,to:move.to,promotion:p});
    });
    op.appendChild(btn);
  });
  md.classList.add('vis');
}

/* ====== Engine Move ====== */
function requestEngineMove(){
  if(!started||gameOver||chess.turn()===playerColor)return;
  thinking=true;showThinking();stopPlayerClock();render();
  sfEval=0;sfDepth=0;sfNodes=0;sfTime=0;
  document.getElementById('thinkTxt').textContent=useFallback?'IA Custom calculando...':'Stockfish calculando...';

  if(useFallback){
    var depth=engineDepth;
    var timeLimit=Math.max(1000,depth*200);
    customAI.search(chess,depth,timeLimit,function(move,d,nodes,time){
      if(move&&started&&!gameOver&&chess.turn()!==playerColor){
        var result=chess.move(move);
        if(result){
          lastMove={from:result.from,to:result.to};
          trackCaptured(result);
          sfDepth=d;sfNodes=nodes;sfTime=time;sfEval=0;
          updEngDisplay();
        }
      }
      thinking=false;hideThinking();render();
      startPlayerClock();
      checkGameOver();
    });
    return;
  }

  if(!stockfishReady||!stockfish){
    thinking=false;hideThinking();render();
    startPlayerClock();
    return;
  }

  stockfish.postMessage('stop');
  stockfish.postMessage('position fen '+chess.fen());
  stockfish.postMessage('go depth '+engineDepth);
}

function onBestMove(line){
  var parts=line.split(' ');
  if(parts.length<2||!started){thinking=false;hideThinking();render();return;}
  var mvStr=parts[1];
  var from=mvStr.substring(0,2);
  var to=mvStr.substring(2,4);
  var promo=mvStr.length>4?mvStr[4]:undefined;
  var move=chess.move({from:from,to:to,promotion:promo});
  if(move){
    lastMove={from:move.from,to:move.to};
    trackCaptured(move);
    thinking=false;hideThinking();
    render();
    startPlayerClock();
    checkGameOver();
  }else{
    thinking=false;hideThinking();render();
  }
}

/* ====== Clock ====== */
function startPlayerClock(){
  if(tMinutes<=0||gameOver)return;
  stopClock();
  timerI=setInterval(function(){
    if(gameOver||thinking||chess.turn()!==playerColor)return;
    if(playerColor==='w')wTime--;else bTime--;
    if(wTime<=0){wTime=0;gameOver=true;stopClock();showGO('Tempo Esgotado','Brancas perderam por bandeira','\u23F0');}
    if(bTime<=0){bTime=0;gameOver=true;stopClock();showGO('Tempo Esgotado','Pretas perderam por bandeira','\u23F0');}
    updateClocks();
  },1000);
}
function stopPlayerClock(){stopClock();}
function stopClock(){if(timerI){clearInterval(timerI);timerI=null;}}
function updateClocks(){
  function fmt(t){var m=Math.floor(t/60),s=t%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
  var wt=document.getElementById('tmrW'),bt=document.getElementById('tmrB');
  wt.textContent=fmt(wTime);bt.textContent=fmt(bTime);
  wt.classList.toggle('lt',wTime<=30&&tMinutes>0&&playerColor==='w');
  bt.classList.toggle('lt',bTime<=30&&tMinutes>0&&playerColor==='b');
}

/* ====== Game Over ====== */
function checkGameOver(){
  if(chess.in_checkmate()){
    gameOver=true;stopPlayerClock();
    var winner=chess.turn()==='w'?'Pretas':'Brancas';
    var pw=chess.turn()!==playerColor;
    showGO(pw?'Vitoria!':'Derrota',winner+' venceram por cheque-mate!',pw?'\u2614':'\u2639');
    return true;
  }
  if(chess.in_stalemate()){gameOver=true;stopPlayerClock();showGO('Empate','Afogamento (stalemate)','\u2614');return true;}
  if(chess.in_draw()){gameOver=true;stopPlayerClock();showGO('Empate','Regra das 50 jogadas ou material insuficiente','\u2614');return true;}
  if(chess.in_threefold_repetition()){gameOver=true;stopPlayerClock();showGO('Empate','Repeticao tripla','\u2614');return true;}
  return false;
}
function showGO(t,d,i){
  document.getElementById('goI').textContent=i;
  document.getElementById('goT').textContent=t;
  document.getElementById('goD').textContent=d;
  document.getElementById('goM').classList.add('vis');
}

/* ====== Game Control ====== */
function newGame(){
  document.getElementById('goM').classList.remove('vis');
  document.getElementById('promoM').classList.remove('vis');
  chess.reset();
  flipped=playerColor==='b';
  gameOver=false;thinking=false;started=false;
  selectedSquare=null;selectedMoves=[];lastMove=null;
  capturedW=[];capturedB=[];
  wTime=tMinutes*60;bTime=tMinutes*60;
  sfEval=0;sfDepth=0;sfNodes=0;sfTime=0;
  stopClock();hideThinking();
  render();
  document.getElementById('btnStart').style.display='';
  document.getElementById('einfo').style.display='none';
  document.getElementById('pnlW').classList.remove('on');
  document.getElementById('pnlB').classList.remove('on');
}

function startMatch(){
  if(started||gameOver)return;
  started=true;
  document.getElementById('btnStart').style.display='none';
  if(playerColor==='w')startPlayerClock();
  render();
  if(playerColor==='b')requestEngineMove();
}

function undo(){
  if(thinking||gameOver||!started)return;
  if(playerColor==='b'){
    if(chess.history().length<2)return;
    chess.undo();chess.undo();
    if(capturedW.length>0)capturedW.pop();
    if(capturedB.length>0)capturedB.pop();
  }else{
    if(chess.history().length<1)return;
    chess.undo();
    if(capturedW.length>0)capturedW.pop();
    else if(capturedB.length>0)capturedB.pop();
  }
  var hist=chess.history({verbose:true});
  lastMove=hist.length>0?{from:hist[hist.length-1].from,to:hist[hist.length-1].to}:null;
  selectedSquare=null;selectedMoves=[];
  render();
}
function flip(){flipped=!flipped;render();}
function resign(){
  if(gameOver||!started)return;
  gameOver=true;stopClock();
  var w=playerColor==='w'?'Pretas':'Brancas';
  showGO(playerColor==='w'?'Derrota':'Vitoria',w+' venceram por rendicao',playerColor==='w'?'\u2639':'\u2614');
}

function toggleCfg(){document.getElementById('cfgP').classList.toggle('open');}

function onDiff(){
  var v=parseInt(document.getElementById('selDiff').value);
  var depths=[8,12,16,20];engineDepth=depths[v-1]||12;
  var ls={1:'FACIL',2:'MEDIO',3:'DIFICIL',4:'EXPERT'};
  var cs={1:'e',2:'m',3:'h',4:'x'};
  document.getElementById('badge').textContent=ls[v];
  document.getElementById('badge').className='db '+cs[v];
  if(stockfishReady&&stockfish){
    stockfish.postMessage('setoption name Skill Level value '+getSkillLevel());
  }
}
function onTmr(){tMinutes=parseInt(document.getElementById('selTmr').value);newGame();}
function onClr(){
  playerColor=document.getElementById('selClr').value;
  document.getElementById('pnW').textContent=playerColor==='w'?'Voce (Brancas)':'Stockfish (Brancas)';
  document.getElementById('pnB').textContent=playerColor==='b'?'Voce (Pretas)':'Stockfish (Pretas)';
  newGame();
}

/* ====== Event Listeners (Programmatic - No IIFE issues) ====== */
document.addEventListener('DOMContentLoaded',function(){
  boardEl=document.getElementById('board');

  document.getElementById('btnCfg').addEventListener('click',toggleCfg);
  document.getElementById('btnStart').addEventListener('click',startMatch);
  document.getElementById('btnUndo').addEventListener('click',undo);
  document.getElementById('btnFlip').addEventListener('click',flip);
  document.getElementById('btnResign').addEventListener('click',resign);
  document.getElementById('btnNewGame').addEventListener('click',newGame);

  document.getElementById('selDiff').addEventListener('change',onDiff);
  document.getElementById('selTmr').addEventListener('change',onTmr);
  document.getElementById('selClr').addEventListener('change',onClr);

  document.getElementById('promoM').addEventListener('click',function(e){if(e.target===this)this.classList.remove('vis');});

  document.addEventListener('keydown',function(e){
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
    if(e.key==='Escape'){
      document.getElementById('goM').classList.remove('vis');
      document.getElementById('promoM').classList.remove('vis');
    }
  });

  initStockfish();
  updateAIBadge();
  newGame();
});
</script>
